    After six months of daily use the fabric on the seat has started to thin and fade, but the recliner mechanism itself has never once jammed or failed to lock in place.
  assistant:
    aspects:
    - facet: durability
      polarity: negative
      evidence: fabric on the seat has started to thin and fade
    - facet: reliability
      polarity: positive
      evidence: recliner mechanism itself has never once jammed or failed to lock

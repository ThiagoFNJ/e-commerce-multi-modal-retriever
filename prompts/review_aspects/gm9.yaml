notes: 'gm3 (F1 0.6384) is still the best node in this lineage: all five of its children so far (gm4 0.6060,
  gm5 0.5837, gm6 0.5881, gm7 0.5894, gm8 0.5907) edited the same five-term functionality/reliability/durability/build-quality/material
  distinctions bullet -- sharpening material-vs-build-quality-vs-softness, rewriting material, adding
  a formal effectiveness definition, leaving the bullet untouched, extending the performance-ban and near-synonym
  text -- and every one scored worse than gm3. That boundary is either already near this 12b model''s
  ceiling for this instruction style or is fragile to any touch, so gm9 leaves it, the performance-ban
  sentence, and the effectiveness/durability/material wording completely unedited and instead targets
  two evidenced error masses no prior round touched: (1) color vs. appearance. gm3''s own top-FP/FN lists
  show ''color'' is now the 4th-largest false positive (7) while ''appearance'' is the single largest
  false negative (9) -- the same ''new term becomes filler'' pattern seen earlier with durability/functionality,
  now hitting the ''color'' term gm3 itself introduced last round. The B06W532RC3 hair-chalk review is
  a concrete instance: gold wants ''color payoff: positive'' for ''it shows up really well'', but gm3
  predicts ''performance'' (a banned term) -- the model isn''t recognizing payoff/vividness language as
  color-related at all, so it falls back to a banned generic term instead of either ''color'' or ''appearance''.
  (2) fit vs. sizing accuracy. ''fit'' appears in BOTH the FP (3) and FN (4) lists, and B01BI85NTA#7 (''Extremely
  large at the bottom of leg opening'', gold=''fit'', pred=''sizing accuracy'') shows the crossing directly:
  the current ''sizing accuracy'' definition (''how a wearable item runs relative to its labeled size'')
  is broad enough to also swallow a localized, single-region fit complaint, so the model reasonably but
  incorrectly maps a region-specific looseness to the size-accuracy vocabulary. Edits: (a) sharpened ''color''
  to require genuine hue-naming, photo/expectation color-comparison, OR explicit payoff/vividness/pigmentation
  language, so ''shows up really well'' now cues ''color'' instead of the banned ''performance''; (b)
  sharpened ''appearance'' to explicitly include generic look/finish/sparkle reactions that don''t name
  a hue, so it isn''t starved when ''color'' is properly restricted; (c) narrowed ''sizing accuracy''
  to overall labeled-size correctness and added a new preferred term ''fit'' for how a specific region
  or part of a wearable item fits the body, independent of overall size -- directly targeting B01BI85NTA.
  No new facet name (e.g. a dedicated ''case quality'' term for the hair-chalk review''s box) was added
  because only that single review supports it, versus the two aggregate-level crossed masses above; left
  for a future round if the pattern recurs. Two new synthetic few-shot examples (within the 2-example
  budget) were added, neither copied from the dev set: a jeans/waistband review demonstrating sizing-accuracy-overall
  vs. fit-at-a-region in the same review, and a liquid-lipstick review demonstrating color-payoff language
  mapped to ''color'' distinct from a separate ''appearance'' (finish) facet in the same review.'
change_summary: '1. Sharpened ''color'' to require a named hue, a photo/expectation color comparison,
  or explicit payoff/vividness/pigmentation language -- targets color''s rise to the 4th-largest FP (7)
  and the B06W532RC3 review where ''shows up really well'' was mispredicted as the banned ''performance''
  instead of any color-related facet.

  2. Broadened ''appearance'' to explicitly cover generic look/finish/sparkle reactions that name no hue
  -- prevents appearance (already the single largest FN at 9) from being starved further now that ''color''
  is restricted.

  3. Narrowed ''sizing accuracy'' to overall labeled-size correctness only, and added a new preferred
  term ''fit'' for how a specific region/part of a wearable item fits the body independent of overall
  size -- targets B01BI85NTA#7 (gold ''fit'', predicted ''sizing accuracy'') and the fit FP(3)/FN(4) two-way
  crossing.

  4. Left the five-term functionality/reliability/durability/build-quality/material distinctions bullet,
  the performance-ban sentence, and the effectiveness/creative-works bullet completely unedited -- four
  different prior rounds (gm4, gm5, gm6, gm8) each edited some part of this area and every one scored
  below gm3, so this round does not re-touch it.

  5. Added one new synthetic few-shot example (jeans/waistband) demonstrating sizing-accuracy-overall
  vs. region-specific fit in the same review, without copying any development-set text.

  6. Added one new synthetic few-shot example (liquid lipstick) demonstrating color-payoff language mapped
  to ''color'' as distinct from a separate ''appearance'' (finish) facet in the same review, without copying
  any development-set text.'
version: gm9
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION or discrete COMPONENT of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life', 'camera', 'speaker'. If several components share one complaint (e.g. multiple panels that all fit badly), name the shared dimension once ('fitment', 'build quality') rather than each part; name a specific component only when its opinion is genuinely distinct from the rest.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
  - Prefer the most specific concrete facet the review actually supports over a broad outcome or category term. This applies to ALL SEVEN of 'effectiveness', 'functionality', 'reliability', 'durability', 'build quality', 'material', and 'appearance': reach for one of these seven only when the review gives no more specific mechanism, feature, or quality to name -- if it names one (suction, stability, sturdiness, portability, strength, softness, mess control, organization, mounting design, ease of attachment, dispensing, storage capacity, power, battery life, software, versatility, brewing quality, and so on), use that specific term instead. Never use 'performance' as a facet: always name the specific thing that performed well or badly (power, speed, brewing quality, accuracy, ...).
  - Among those seven broad terms, when more than one could plausibly apply, use these distinctions:
    - 'functionality': the product's features or mechanisms operate as designed, including plain "it works" / "no problems" statements with no further detail given.
    - 'reliability': the product (or one of several like units) stops working, malfunctions, glitches, or behaves inconsistently -- across repeated use or after a period of time -- even if that happens later rather than immediately. A device that fails outright after months of use is a reliability judgment, not a durability one.
    - 'durability': the product's physical materials or components gradually wear, fade, weaken, or degrade over extended time or repeated use -- a condition/degradation judgment, not a stop-working judgment -- and never immediate/out-of-box defects.
    - 'build quality': how well the product is assembled or constructed -- workmanship, structural integrity, parts fitting together, or defects, including out-of-box defects -- and also any bare, undetailed statement of overall "quality" ('great quality', 'the quality is amazing') that does not itself describe the substance or fabric.
    - 'material': the substance or fabric itself, judged on its own feel, texture, or composition ('great material', 'feels like cheap plastic', 'soft fabric') -- only when the review actually describes that substance; a generic quality compliment with no substance description is 'build quality', not 'material'.
  - When a review makes many small observations that all serve one underlying theme (a long testimonial on whether a workout, tool, or treatment worked as intended) AND names no other distinct concrete dimension, extract ONE facet for that theme using the definitions above instead of several fine-grained ones that fragment it. Do not apply this consolidation to a short review that already names 1-3 distinct concrete dimensions -- extract those directly instead.
  - 'effectiveness', 'durability', 'build quality', and 'material' describe physical products or products applied to the body, and never apply to creative or informational works (books, movies, shows, music, articles). For those, use dimensions such as 'plot', 'characters', 'writing quality', 'pacing', 'humor', 'engagement', 'emotional impact', or 'entertainment value' instead.
  - Preferred terms for near-synonyms (matching is by semantic similarity, so use the left term, not the one on the right): 'color' for a comment that names a specific hue, compares color to photos/expectations, or describes how vividly, intensely, or accurately a color pays off, shows up, or is pigmented when applied (e.g. on hair, skin, or fabric) -- reserve 'color' for genuine hue/payoff language, not for any generic positive or negative look comment; 'appearance' for a general visual impression, finish, print, sparkle/shine, or overall look ('looks great', 'looks cheap', 'nice finish') that does not name a hue or describe color payoff (-> 'color' instead) and is not framed as a considered style choice (-> 'design' instead); 'design' for the product's overall styling, shape, or aesthetic/ergonomic design as a considered choice ('beautiful design', 'sleek design', 'well-designed'); 'size' for a non-wearable object's physical dimensions being too big or small for its purpose; 'sizing accuracy' for whether a wearable item runs true to its labeled or expected size overall (runs small/big, order a size up/down); 'fit' for how a specific region or part of a wearable item fits the body -- loose, tight, gapping, chafing, riding up at a particular spot -- independent of whether the item's overall labeled size was accurate; 'included accessories' for extra items, tools, or parts bundled with the product.
  - If none of the terms above fit, name the dimension using the review's own vocabulary (e.g. 'installation', 'condition', 'thickness', 'scratch resistance', 'ease of cleaning', 'sturdiness', 'portability', 'strength', 'softness', 'mess control', 'organization', 'mounting design', 'ease of attachment', 'dispensing', 'ingredient safety', 'educational value', 'scent', 'storage capacity') rather than forcing it into one of the broad terms above.

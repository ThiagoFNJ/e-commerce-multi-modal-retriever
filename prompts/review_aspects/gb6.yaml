notes: 'gb2 is the best candidate so far (F1 0.4974, up from gb1''s 0.4771), but its own three children
  -- gb3 (banned ''durability'' outright, F1 0.4784), gb4 (banned recommendation/overall-verdict facets,
  F1 0.4766), and gb5 (reframed price/value as an outcome rule plus a component-name-to-dimension instruction,
  F1 0.4794) -- all scored worse than gb2 itself, so this round returns to gb2 as parent and avoids re-trying
  those three directions (no outright durability ban, no outright recommendation ban, no price/value outcome-rule
  reframe). Grounded in gb2''s own measured results instead: (1) The single most coherent, evidence-dense
  pattern in the 20 worst reviews is a creative-work facet-vocabulary gap: three separate f1=0.0 reviews
  (1547602589#11, B00JNQKR8C#9, B07XB3H7HM#2) have gold facets ''engagement'', ''emotional impact'', ''excitement'',
  ''entertainement'' and ''humor'' that gb2''s craft-dimension list (plot, characters, writing quality,
  content quality, pacing) simply does not cover, so the model substitutes the nearest listed term (plot/writing
  quality) and misses entirely under 0.80 cosine matching. (2) The dedup rule, already restated once in
  gb2, is still being violated in the same worst-review set (1547602589#11 outputs ''plot'' twice) --
  prose restatement isn''t enough, so this round adds an explicit mandatory self-check step instead of
  just re-wording the instruction. (3) Aggregate stats show ''appearance'' is still the single largest
  missed-facet mass (14) even after gb1''s and gb2''s fixes, and the worst-review evidence shows why:
  brief visual asides (''It was pretty but fell apart'', ''looks like Quality without looking feminine'')
  are being dropped, apparently pruned by the salience/6-facet cap in favor of other content -- so the
  rule now explicitly protects short appearance mentions from that pruning. Separately, ''durability''
  remains the largest single FP name (15, vs only 3 matching FN) and the worst-review evidence (B00IN9W73S#5
  ''fell apart as I removed from pkg'' -> gold build quality, pred durability) shows it is being used
  for one-time breakage that gold calls ''build quality'' -- rather than banning durability (gb3''s failed
  approach), this round disambiguates it as extended-wear-over-time only, leaving it available for the
  3 golds that do use it. (4) B007D53QRE#9 (6 FP, 1 FN, f1=0.0) and B07ZHYS7MD#6 (3 FP, f1=0.0, a review
  gb2 already targeted directly with the furniture-assembly example) both show the exclusion rule failing
  specifically when the excluded content (listing accuracy, seller behaviour, shipping, customer service)
  is the LONGER, more salient part of the review and the genuine product detail is a short buried clause
  -- a second worked example alone didn''t fix B07ZHYS7MD#6, so this round adds an explicit instruction
  that extraction should not be biased by which content takes up more of the review, plus one new synthetic
  example demonstrating exactly this buried-short-detail pattern (mirroring B007D53QRE#9''s structure,
  not its text).'
change_summary: '1. Product-intrinsic exclusion rule: added an explicit instruction that the relative
  LENGTH of a complaint does not determine what to extract -- a short buried product clause is still extracted,
  a long dominant service/listing complaint is still fully dropped. Targets B007D53QRE#9 (6 FP from listing/seller/shipping/refund,
  missed the sole gold ''installation'') and B07ZHYS7MD#6 (customer-service FPs persisting despite gb2''s
  targeted fix).

  2. Creative-work craft-dimension list: added ''engagement'', ''emotional impact'', and ''humor'' alongside
  the existing plot/characters/writing quality/content quality/pacing set. Targets 3 of the 20 worst reviews
  (1547602589#11, B00JNQKR8C#9, B07XB3H7HM#2), all f1=0.0, all missing gold facets outside gb2''s craft-vocabulary.

  3. Specific-dimension rule: disambiguated ''build quality'' (construction/sturdiness including a ONE-TIME
  breakage) from ''durability'' (only for wear over an EXTENDED period, when the review itself frames
  it that way) instead of banning durability outright (gb3 tried an outright ban and F1 dropped to 0.4784).
  Targets durability''s persistent FP mass (15 vs 3 matching FN) and B00IN9W73S#5 (''fell apart'' misclassified
  as durability instead of gold ''build quality'').

  4. Specific-dimension rule: added an explicit protection for brief appearance mentions (''it was pretty'',
  ''looks like quality'') from being dropped under the salience/6-facet cap. Targets appearance''s continued
  status as the largest missed-facet mass (14) and two worst reviews (B00IN9W73S#5, B07BHKVZPX#8) where
  visual language was present but entirely absent from the prediction.

  5. Dedup rule: added a mandatory re-scan-before-returning step instead of only restating the no-duplicates
  rule in prose (gb2 already restated it once and the violation recurred). Targets 1547602589#11, where
  ''plot'' was output twice.

  6. Added few-shot example 9 (memoir review, synthetic): demonstrates ''engagement'', ''humor'', and
  ''emotional impact'' as distinct craft-dimension facets, reinforcing the new vocabulary from edit 2.

  7. Added few-shot example 10 (mis-shipped item, synthetic): demonstrates extracting a single short genuine
  product detail (''clip snaps on tight'') while fully dropping a longer, dominant listing/seller/shipping
  complaint -- reinforces edit 1, modeled on B007D53QRE#9''s structure but a different synthetic scenario,
  not copied.'
version: gb6
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'build quality', 'sizing accuracy', 'ease of use'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, and anything about buying or owning the product rather than the product itself. Specifically exclude: the price paid, value for money, cost, and whether it's "worth it" or a "reasonable price"; listing/description accuracy; and customer service in any form -- support responsiveness, replacement-parts availability, warranty handling, how fast or slow the seller/manufacturer replied. If a sentence mixes a real product complaint with a service/support complaint (e.g. "the charger stopped working and support never replied"), extract only the product part. The RELATIVE LENGTH of a complaint does not decide what to extract: a single short clause naming a genuine product detail is still extractable even if it's buried inside a much longer listing/seller/shipping/service complaint, and a long service or support complaint is still fully excluded even if it dominates the review -- judge each clause by what it's about, not by how much of the review it takes up.
  - Never the product category itself ('boots' is not a facet of boots); no brand names; never a named character, person, actor, or title -- for books, movies, and other creative works, name the CRAFT dimension being judged instead: 'plot', 'characters', 'writing quality', 'content quality', 'pacing', 'engagement' (how compelling or hard to put down it is), 'emotional impact' (how moving or affecting it is), 'humor' (how funny it is), 'video quality', 'audio quality' -- never the character's, author's, or performer's name.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - CONSOLIDATE: if several sentences all describe the same underlying dimension (e.g. multiple specific examples of the product working, or not working, as intended), report ONE facet for that dimension, not one per example. Most reviews need only 1-3 facets; use more only when the review clearly discusses several distinct dimensions.
  - Name the SPECIFIC dimension the review is actually about -- 'installation', 'assembly', 'adjustability', 'cord length', 'cup size', 'subtitles', 'ingredient transparency', 'included accessories' are all better facets than a vague bucket term when the review is clearly about that specific thing. Only fall back to one of these broad names when the review is genuinely about the general quality and no more specific name fits: effectiveness (does it achieve its core purpose), functionality (do its features work as intended), reliability (does it keep working, without failing or breaking down, across repeated use), build quality (construction, sturdiness -- including a ONE-TIME breakage, crack, or falling apart, e.g. "fell apart as I unpacked it"), durability (holds up over an EXTENDED period of repeated wear or use -- only use this when the review itself frames it that way, e.g. "after six months of daily use"; a single immediate failure is build quality, not durability), appearance (look, style, design, color, finish -- these are all the same dimension; any visual/cosmetic remark, even a brief aside like "it was pretty" or "looks like quality", is appearance and must not be dropped from the output just because another facet in the same review seems more substantial), size (actual physical dimensions), sizing accuracy (fit relative to the size ordered), ease of use (day-to-day operation, not a one-time setup step like installation or assembly), material, comfort.
  - Deduplicate facets: never output the same facet name twice in one review, even if it comes up in several sentences (see CONSOLIDATE). Before returning your answer, re-scan the facet list you are about to output and merge or remove any repeated name -- this check is mandatory even when you're confident you already deduplicated while composing. At most 6 facets, the most salient. If the review discusses no concrete product dimension, return an empty list.

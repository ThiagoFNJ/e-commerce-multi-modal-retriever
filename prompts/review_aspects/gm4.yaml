reflector: sonnet subagent, template_v1
notes: 'The largest and most stubborn error mass, round over round, is the material/build-quality cluster:
  build quality is simultaneously the #1 FP (13) and a top-5 FN (5); material is the #2 FP (11). gm3''s
  fix (restrict material to substance/fabric, default bare quality to build quality) clearly didn''t transfer:
  the Jellycat-bunny review (''high quality, soft, and cute'') still got material+appearance instead of
  gold''s build quality+softness, the baby-blanket review (''el material esta super bien, es muy suave...
  la calidad es superior'') got only material instead of softness+build quality, and the LED-strobe review
  (''very rigid plastic... very robust and compact'') still got material+build quality instead of gold''s
  sturdiness+portability -- the same failure the gm2->gm3 camping-stool example was built to fix, recurring
  on a near-identical case. The common thread across all three is that ''material'' is being used as a
  catch-all whenever a substance word appears, without checking whether the actual judgment is a texture
  comment (softness), a bare quality compliment (build quality), or a structural-strength claim (sturdiness/build
  quality) riding on a substance word. I sharpened the material definition to name all three carve-outs
  explicitly. Second, ''appearance'' is the single largest missed-gold-facet mass (FN=9) while ''design''
  is a top FP (6) -- these are correlated: last round''s broadening pushed all seven terms including ''appearance''
  into ''avoid unless no more specific term fits'', but appearance''s own definition already positions
  it as the correct default for a plain visual impression, so the model is now over-avoiding it (often
  replacing it with ''design'' or nothing) exactly when gold wants the bare term. I pulled appearance
  out of the six-term avoidance set and restated it as the default. Third, ''effectiveness'' has the largest
  FN mass among the seven/six broad terms (7) yet, on inspection, is the only one of them with no formal
  distinction in the prompt (the distinctions bullet defines functionality, reliability, durability, build
  quality, and material, but never effectiveness) -- and two worst-scoring reviews show the model keying
  off a literal surface word instead (the pitbull-collar review, where ''his nose doesn''t fit inside''
  triggered facet ''fit'' for what gold scores as effectiveness/the collar working; the angel-hair-pasta
  review, where ''angel hair, not spaghetti'' triggered ''size'' for what gold scores as effectiveness/failing
  to deliver the promised product; and the organizing-tool review, where the word ''organizing'' triggered
  facet ''organization'' for what gold scores as functionality). I added a formal effectiveness definition
  plus an explicit instruction to judge what the sentence evaluates rather than a literal keyword. Fourth,
  ''sizing accuracy'' (FP=5) and ''fit'' (FN=4) are a correlated pair: the leg-opening review (''extremely
  large at the bottom of leg opening'') is gold-labeled fit (a cut/shape issue in one area) but predicted
  sizing accuracy (the current definition, ''how a wearable item runs relative to labeled size'', reads
  as matching this case literally) -- I split the two into distinct preferred terms: sizing accuracy for
  overall size-label accuracy, fit for cut/shape/looseness in a specific body area, independent of the
  size label. Fifth, two worst-scoring reviews show a genuine, previously unaddressed polarity failure:
  the alligator-clip review (gold: clip strength NEUTRAL, ''better this way than too loose though'') and
  the water-bottle-cap review (gold: durability NEUTRAL, ''if it lasts I''ll be happy'') both got a confident
  positive/negative instead of neutral -- both are cases where the reviewer explicitly reframes a seemingly
  one-sided detail as an acceptable trade-off or a hoped-for (not confirmed) outcome. I added an explicit
  neutral-polarity rule with both examples as illustrative patterns. Sixth, ''performance'' is still a
  top-15 FP (4) despite being explicitly banned already -- since this is a compliance failure on an existing
  rule rather than a missing rule, I promoted it to its own standalone sentence for salience rather than
  inventing a new mechanism. Finally, several smaller FN/FP pairs are pure naming/vocabulary gaps below
  the 0.80 similarity bar (durability predicted vs. gold ''longevity'' and ''ease of cleaning'' predicted
  vs. gold ''erasability'' in the markers review; ''leakage'' vs. gold ''leak protection''; the hair-chalk-box
  review wanting a unified ''case quality'' where the model split build quality+organization; ''ease of
  attachment'' vs. gold ''clip strength''; plus ''listing accuracy'', ''content quality'', ''compatibility'',
  and ''weight'' recurring as missed gold facets) -- I added these as vocabulary entries only, without
  inventing dedicated rules per term, consistent with how the smaller masses were handled last round.
  For the two few-shot changes (within budget): a weighted-blanket example demonstrates build quality
  + softness as separate facets with material used for neither, plus color via photo-comparison, directly
  targeting the material/build-quality/softness confusion; a no-pull-harness example demonstrates effectiveness
  (not the literal word ''fit'') paired with a neutral-polarity buckle-strength trade-off, targeting the
  effectiveness/literal-keyword and neutral-polarity gaps together. Both are dense, multi-aspect, and
  written fresh, without copying any development-set review.'
change_summary: 'Sharpened the material vs. build-quality vs. softness boundary (biggest lever: build
  quality FP=13/FN=5, material FP=11, recurring across the Jellycat-bunny, baby-blanket, and LED-strobe
  worst reviews): texture/hand-feel words now map to softness, bare quality words to build quality, and
  rigid-material-supporting-a-strength-claim to sturdiness/build quality -- material is reserved for judgments
  actually about the substance itself.

  Pulled ''appearance'' out of the six-term ''prefer specific over generic'' avoidance set and restated
  it as the default general visual-impression term -- targets appearance''s FN=9 (largest missed-facet
  mass) alongside design''s FP=6, which together show last round''s broadening over-suppressing legitimate
  bare-appearance calls.

  Added a formal ''effectiveness'' definition (previously the only one of the seven/six broad terms with
  no distinction bullet) plus an explicit instruction to judge the sentence''s real subject rather than
  a literal keyword -- targets effectiveness FN=7 and the fit/size/organization misfires in the pitbull-collar,
  angel-hair-pasta, and organizing-tool reviews.

  Split ''fit'' from ''sizing accuracy'' into two distinct preferred terms (overall size-label accuracy
  vs. cut/shape conforming to the body in one area) -- targets the correlated sizing accuracy FP=5 / fit
  FN=4 masses, evidenced by the leg-opening review.

  Added an explicit neutral-polarity rule for trade-off / hoped-for-outcome framings -- targets two worst-scoring
  reviews (alligator-clip, water-bottle-cap) where a negative-sounding clause was reframed by the reviewer
  as an acceptable trade-off or unconfirmed hope and gold scored it neutral, but the model forced a confident
  positive or negative.

  Promoted ''never use performance'' to its own standalone sentence (previously buried mid-bullet) --
  performance is still a top-15 FP (4) despite already being banned, so this is a compliance/salience
  fix, not a new rule.

  Expanded the closing vocabulary list with terms surfaced by this round''s near-miss semantic mismatches
  (erasability, longevity, leak protection, case quality, buckle strength, clip strength, compatibility,
  listing accuracy, weight) -- each was a small missed/false-positive pair caused by the model''s synonym
  not clearing the 0.80 similarity threshold.

  Added one new synthetic few-shot example (weighted blanket) demonstrating build quality + softness as
  separate facets, with material used for neither, plus color via photo-comparison -- without copying
  any development-set text.

  Added one new synthetic few-shot example (no-pull dog harness) demonstrating effectiveness (the outcome,
  not the literal word ''fit'') alongside a neutral-polarity buckle-strength trade-off -- without copying
  any development-set text.'
version: gm4
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION or discrete COMPONENT of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life', 'camera', 'speaker'. If several components share one complaint (e.g. multiple panels that all fit badly), name the shared dimension once ('fitment', 'build quality') rather than each part; name a specific component only when its opinion is genuinely distinct from the rest.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Polarity is 'neutral' when the review frames a seemingly negative or positive detail as a net acceptable trade-off, an explicit hope/expectation rather than a confirmed judgment, or a wash between two considerations -- do not force these to positive or negative just because one clause on its own sounds that way. E.g. 'the clip is hard to open one-handed, but better this way than too loose' is neutral (the reviewer treats it as an acceptable trade-off); 'could be a bit cheaper, but if it lasts I'll be happy' is neutral (a hoped-for outcome, not a confirmed one).
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
  - Prefer the most specific concrete facet the review actually supports over a broad outcome or category term. This applies to 'effectiveness', 'functionality', 'reliability', 'durability', 'build quality', and 'material': reach for one of these six only when the review gives no more specific mechanism, feature, or quality to name -- if it names one (suction, stability, sturdiness, portability, strength, softness, mess control, organization, mounting design, ease of attachment, dispensing, storage capacity, power, battery life, software, versatility, brewing quality, and so on), use that specific term instead. Judge what the sentence is actually evaluating, not a literal keyword it happens to contain: a comment using the word 'fit' or 'size' that is really about whether the product achieves its purpose is 'effectiveness', not 'fit'/'size'; a comment using the word 'organizing' for a product whose entire purpose IS organizing is 'functionality', not a separate 'organization' facet reserved for an organizing feature bundled into some other kind of product.
  - Never use 'performance' as a facet, under any circumstance: always name the specific thing that performed well or badly (power, speed, brewing quality, accuracy, effectiveness, functionality, ...).
  - 'appearance' is different from the six terms above: it is already the general, default term for a plain visual impression ('looks nice', 'looks cheap', general finish or print), so use it directly rather than avoiding it -- only reach past it for a more specific visual term ('color', 'design') when the review names a specific visual attribute instead of a generic looks judgment.
  - Among the six broad terms above, when more than one could plausibly apply, use these distinctions:
    - 'effectiveness': whether the product actually achieves the outcome, benefit, or result it is meant to deliver -- pain relief, cleaning result, taste, weight loss, a promised spec actually being met -- an outcome judgment, distinct from 'functionality' (the mechanism itself operating as designed) and 'reliability' (whether it keeps working consistently over time).
    - 'functionality': the product's features or mechanisms operate as designed, including plain 'it works' / 'no problems' statements with no further detail given.
    - 'reliability': the product (or one of several like units) stops working, malfunctions, glitches, or behaves inconsistently -- across repeated use or after a period of time -- even if that happens later rather than immediately. A device that fails outright after months of use is a reliability judgment, not a durability one.
    - 'durability': the product's physical materials or components gradually wear, fade, weaken, or degrade over extended time or repeated use -- a condition/degradation judgment, not a stop-working judgment -- and never immediate/out-of-box defects.
    - 'build quality': how well the product is assembled or constructed -- workmanship, structural integrity, parts fitting together, or defects, including out-of-box defects -- and also any bare, undetailed statement of overall quality ('great quality', 'the quality is amazing', 'la calidad es superior') that does not itself describe a substance, fabric, or texture.
    - 'material': the substance or fabric itself, judged on its own feel, texture, or composition ('great material', 'feels like cheap plastic') -- only when the review actually names that substance AND the judgment is about the substance itself, not a texture or quality label riding on it. A texture/hand-feel comment ('soft', 'suave', 'pachoncito', 'plush', 'fluffy') is 'softness', not 'material'. A bare quality compliment ('high quality', 'buena calidad') with no substance description is 'build quality', not 'material'. A rigid/robust material description that is really supporting a structural-strength or compactness claim ('made of rigid plastic... very robust and compact') is 'sturdiness'/'build quality', not 'material'.
  - When a review makes many small observations that all serve one underlying theme (a long testimonial on whether a workout, tool, or treatment worked as intended) AND names no other distinct concrete dimension, extract ONE facet for that theme using the definitions above instead of several fine-grained ones that fragment it. Do not apply this consolidation to a short review that already names 1-3 distinct concrete dimensions -- extract those directly instead.
  - 'effectiveness', 'durability', 'build quality', and 'material' describe physical products or products applied to the body, and never apply to creative or informational works (books, movies, shows, music, articles). For those, use dimensions such as 'plot', 'characters', 'writing quality', 'pacing', 'humor', 'engagement', 'emotional impact', 'content quality', or 'entertainment value' instead.
  - Preferred terms for near-synonyms (matching is by semantic similarity, so use the left term, not the one on the right): 'appearance' for a general visual impression, finish, print, or overall look that is not framed as a design choice and not specifically about color; 'color' for a comment specifically about the product's hue or color, whether the reviewer simply likes or dislikes it or is comparing it to photos/expectations; 'design' for the product's overall styling, shape, or aesthetic/ergonomic design as a considered choice ('beautiful design', 'sleek design', 'well-designed'); 'size' for a non-wearable object's physical dimensions being too big or small for its purpose; 'sizing accuracy' for whether a wearable item runs true to its labeled or expected size overall (comparing the size ordered to how it actually fits); 'fit' for how a wearable item's cut or shape conforms to the body in a specific area regardless of the labeled size (looseness, tightness, or bagginess at a particular part, e.g. the leg opening, waist, or sleeve); 'included accessories' for extra items, tools, or parts bundled with the product.
  - If none of the terms above fit, name the dimension using the review's own vocabulary (e.g. 'installation', 'condition', 'style', 'thickness', 'scratch resistance', 'ease of cleaning', 'sturdiness', 'portability', 'strength', 'softness', 'mess control', 'organization', 'mounting design', 'ease of attachment', 'dispensing', 'ingredient safety', 'educational value', 'scent', 'storage capacity', 'erasability', 'longevity', 'leak protection', 'case quality', 'buckle strength', 'clip strength', 'compatibility', 'listing accuracy', 'weight') rather than forcing it into one of the broad terms above.

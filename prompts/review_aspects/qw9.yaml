notes: 'This round''s evidence isolates a different set of levers than the qw4-qw8 branch, which all tried
  to further narrow ''value'' (qw4 F1 0.5506, qw6 F1 0.5606) or rewrite the ''functionality''/''effectiveness''
  rule text (qw5 F1 0.5525, qw7 F1 0.5622) -- every one of those five children scored below qw3''s 0.5696,
  so this round deliberately does not touch the ''value'' rule and does not rewrite the ''functionality''
  bullet again. Instead it targets four patterns visible in the qw3 worst-review evidence that no prior
  round addressed: (1) ''effectiveness'' is the #3 aggregate false-negative (FN=7) and is missed in three
  separate worst-scoring reviews (blue-light glasses: gold ''effectiveness'', pred ''blue light filtering'';
  angel-hair-vs-spaghetti, annotator rationale ''promises Class A but outputs Class B'', gold ''effectiveness'',
  pred ''product type''; dog nose-trainer, gold ''effectiveness'', pred ''fit'') with zero corresponding
  false-positive cost for ''effectiveness'' itself in the aggregate FP list -- pure unaddressed recall.
  Since the rule-text lever for this exact facet already failed twice (qw5, qw7), this round uses the
  untried few-shot lever instead: a new synthetic example demonstrates ''effectiveness'' as the holistic
  purpose-fulfillment judgment, contrasted with a genuinely separate sensory facet, so the model has a
  concrete pattern to imitate rather than more disambiguation prose. (2) The comparison-product exclusion
  rule (already present in qw3''s system prompt) is still failing with zero few-shot reinforcement: the
  worst-scoring review this round (camera review, f1=0.0, fp=5/fn=2) shows the model extracting five facets
  entirely about a comparison product mentioned for context, missing both real gold facets about the product
  actually being reviewed. (3) The listing/description-accuracy exclusion (also already present in qw3,
  and already strengthened via rule text by qw8 -- which still scored below qw3 at 0.5603) is also still
  failing with zero few-shot reinforcement: the peel-and-stick worst review (f1=0.0) has an explicit annotator
  rationale (''listing accuracy is not a feature of the product'') for a case qw3''s own rule should have
  caught. Since qw8 already showed that more rule text for this exclusion doesn''t reliably help, this
  round reinforces it with a demonstration instead, packed into the same new example as the comparison-product
  fix for prompt-length economy (mirroring how qw3''s own soap-dispenser example packed three new rules
  into one non-padded case). (4) ''appearance'' remains the largest unaddressed combined error mass after
  value and functionality (FP=7, FN=13) and has not been touched by any round since qw2; the dress worst
  review (f1=0.0) shows the model collapsing three genuinely distinct gold facets (comfort, zipper, style)
  into a single over-generalized ''appearance'' prediction, the same over-generalization failure mode
  that qw3 already fixed for ''functionality'' (prefer a named specific part/mechanism over the generic
  catch-all) -- the same fix is applied to ''appearance'' here, purely additively (no narrowing of an
  existing exclusion, unlike the failed value/functionality-text edits). (5) ''content quality'' is added
  to the generic-name list (FN=4 aggregate, evidenced by the house-design book worst review, gold ''content
  quality'', pred ''educational value'' + a spurious ''relevance'' facet) as a vocabulary-only addition,
  following the same low-risk additive pattern that successfully introduced ''condition'' and ''stability''
  in qw3, rather than the narrowing-rule pattern that failed in qw4-qw8. Contradictory single-review evidence
  (fit vs size disagree in opposite directions across two different worst reviews) and other single-occurrence
  patterns (sturdiness vs build quality, leak protection vs leakage, color misattribution) are left untouched
  this round as under-evidenced or ambiguous in the gold data itself.'
change_summary: '1) Added a clause to the ''appearance'' disambiguation: appearance must not swallow a
  specific named component or non-visual sensation (e.g. a zipper, a strap, comfort, fit) -- name that
  specific facet instead. Targets appearance''s FP=7/FN=13 combined mass (largest unaddressed cluster
  after value and functionality), evidenced by the dress worst review (f1=0.0, gold={comfort, zipper,
  style}, pred={appearance}). 2) Added ''content quality'' to the generic-name-preference list, for the
  substantive quality/richness of information in non-fiction or educational media, distinct from ''educational
  value'' and from fiction-narrative terms. Targets content quality''s FN=4 aggregate, evidenced by the
  house-design-book worst review (gold ''content quality'', pred ''educational value'' plus a spurious
  ''relevance'' FP). 3) Added a new synthetic few-shot example (bug spray) demonstrating ''effectiveness''
  as the holistic purpose-fulfillment judgment versus a separate sensory facet (scent). Targets effectiveness''s
  FN=7 aggregate (3rd-largest miss), evidenced by three worst reviews this round (blue-light glasses,
  angel-hair-vs-spaghetti, dog-nose-trainer) with no corresponding FP cost -- a few-shot fix rather than
  another rule-text rewrite, since qw5 and qw7''s rule-text edits to this same area both underperformed
  qw3. 4) Added a new synthetic few-shot example (blender) jointly demonstrating the comparison-product
  exclusion (ignoring the sister''s Ninja''s speed settings) and the listing/description-accuracy exclusion
  (ignoring the missing travel lid complaint), while still extracting genuine facets (''effectiveness'',
  ''leak protection'') about the product actually reviewed. Targets the camera-comparison worst review
  (f1=0.0, fp=5/fn=2) and the peel-and-stick worst review (f1=0.0, annotator rationale ''listing accuracy
  is not a feature of the product'') -- both rules already exist in qw3''s text but were unreinforced
  by any example and are still failing; qw8''s text-only strengthening of the listing-accuracy rule already
  underperformed qw3, so this round uses demonstration instead of more prose. Deliberately not touched
  this round: the ''value'' rule (qw4, qw6 both narrowed it and scored below qw3) and the ''functionality''
  bullet text (qw5, qw7 both rewrote it and scored below qw3).'
version: qw9
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'waterproofing', 'battery life', 'appearance'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'the case doesn't flex when squeezed' -> facet 'build quality', polarity 'positive'.
  - Product-intrinsic only: ignore delivery, shipping (including shipping speed and how fast it arrived), the condition of the packaging or box itself (as opposed to the product), the seller, and customer service / support interactions -- they are not aspects of the product. The raw price paid is not a facet, but 'value' -- whether the product's quality or features justify its price, a worth-it-or-not judgment -- is a legitimate, distinct facet. Ignore whether the listing, description, or photos accurately represented the product (a listing-accuracy complaint is not a product aspect) -- if a specific quality is being praised or criticized, name that quality instead. Ignore a single defective or damaged-on-arrival unit that was promptly replaced or resolved and is not described as an ongoing or general flaw -- that is a one-off fulfillment incident, not a product-quality aspect, even when paired with customer-service praise. If the review compares the product being reviewed to a different, alternative product, only extract facets about the product actually being reviewed -- ignore specs or opinions attributed to the alternative.
  - Never the product category itself ('boots' is not a facet of boots); no brand names. Never prefix a facet with the product, its category, or a component name either -- write the bare dimension: 'durability' not 'charger durability', 'video transfer' not 'dvd transfer quality', 'compatibility' not 'charger compatibility'.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Facet naming: use the simplest, most generic dimension name that fits -- near-synonyms are scored as mismatches against the gold vocabulary. Choose carefully among these frequently-confused neighbors:
    - 'sizing accuracy' (not 'size') is for whether the item's labeled/ordered size runs true -- 'runs small', 'order a size up', 'true to size'.
    - 'size' is for the product's own literal dimensions or magnitude when no true-to-size judgment is being made -- 'cup size', 'fits my small apartment'.
    - 'fit' is for how snugly or comfortably the product fits a body or space once in use, not a true-to-size claim.
    - 'assembly' is for putting a multi-part product together from pieces; 'installation' is for mounting, attaching, or setting up a product to be used.
    - 'build quality' is for the solidity/craftsmanship of construction -- 'feels solid', 'doesn't flex', 'fell apart'. 'durability' is for withstanding wear, damage, or breakdown over repeated use or time -- 'still works after months', 'scratches easily', 'broke after a week'.
    - 'stability' is for whether the product stands, balances, or stays in place without tipping, wobbling, or sliding -- distinct from 'build quality' (solidity of construction) and 'durability' (wear resistance over time).
    - 'color' is for hue/tint/shade specifically; 'design' is for styling or shape choices; 'style' is for overall fashion/aesthetic-language preference; 'appearance' is only for a general look/aesthetic impression not already covered by color, design, style, scratch resistance, or condition, and not when the review's complaint is really about a specific named component or a non-visual sensation (a zipper, a strap, comfort, fit) -- in that case name the specific part or sensation instead of defaulting to 'appearance'.
    - 'condition' is for the item's physical state from wear, damage, dirt, or how it arrived or aged -- 'a scuff on arrival', 'filthy', 'cover looks dragged down a road' -- distinct from 'appearance' (an intentional aesthetic/design impression) and from 'build quality'/'durability' (structural solidity and wear resistance).
    - 'scratch resistance' is for whether a surface resists scratches or marks.
    - 'reliability' is for whether the product keeps working without failing or malfunctioning over time -- use it even when the complaint text centers on contacting support about the failure (the failure itself is 'reliability', the support interaction is excluded) -- UNLESS the review describes only a single defective-on-arrival unit that was promptly replaced, which is not a reliability aspect (see the fulfillment-incident exclusion above).
    - 'functionality' is for a holistic does-it-work-as-intended judgment about the product's core purpose, ONLY when no more specific mechanism or action is named in the review -- prefer a specific action/mechanism facet instead whenever the review names one, e.g. 'dispensing', 'organization', 'adjustability', 'educational value', 'ease of cleanup'; don't default to 'functionality' as a catch-all for a review describing a particular task or feature.
    - Other generic names to prefer over narrower compounds: effectiveness, capacity, included accessories, plot, characters, dialogue, pacing, engagement, entertainment, content quality (for the substantive quality or richness of information/subject matter in non-fiction, reference, or educational media -- distinct from 'educational value', which is specifically about learning or instructional benefit, and from 'plot'/'characters', which are for fiction narrative).
  - Deduplicate facets. At most 6, the most salient -- but most reviews genuinely have only 2-4 clear aspects. Never pad the list with generic or weakly-supported facets (e.g. 'user experience', 'versatility', 'additional features') just to approach the cap. If the review discusses no concrete product dimension, return an empty list.
few_shot:
- user: |-
    These boots have amazing arch support and great grip on wet trails, but they are not really waterproof - my socks were soaked after an hour of light rain.
  assistant:
    aspects:
    - facet: arch support
      polarity: positive
      evidence: amazing arch support
    - facet: traction
      polarity: positive
      evidence: great grip on wet trails
    - facet: waterproofing
      polarity: negative
      evidence: not really waterproof - my socks were soaked
- user: |-
    Love it!!! Five stars.
  assistant:
    aspects: []

notes: 'Two edits this round, both extending the exact pattern that worked in gi9 (fix an internal boundary/absence
  rather than touch rule bullets, which failed twice at gi1/gi4). Edit 1: the single largest FP mass in
  the whole report is now ''build quality'' (16, up from being unremarkable before), and the #1 worst-scoring
  review (B00SSG8XDY#1, f1=0.0) shows exactly why -- gold ''durability: positive'' for a notebook''s protective
  metal case surviving heavy daily use was predicted as ''build quality: positive''. Tracing the prompt,
  this is a self-inflicted contradiction: the stuffed-elephant example still teaches that surviving ''a
  year of daily hugs and two trips through the washing machine'' with no stitching failure is ''build
  quality'', which is now the textbook definition of ''durability'' established by gi9''s own tow-strap
  example (''holds up over repeated long-term use without wearing out''). The model has literally been
  shown the same evidence pattern labeled two different ways in two different examples. Relabeling the
  elephant''s second aspect to ''durability'' (same evidence, same polarity) removes the contradiction,
  keeps build quality demonstrated twice elsewhere (Spanish review, desk lamp), and -- as a bonus -- gives
  durability its first-ever POSITIVE demonstration (previously demonstrated only as negative via the tow
  strap), which should help durability''s own FN mass (5) as well as bleed less into build quality. Edit
  2: ''design'' shows a striking symmetric split (FP=5, FN=5) -- a strong signature of a pure naming/near-synonym
  gap rather than a reasoning gap -- and is directly confirmed by worst-scoring review B07ZX3K9S4#4 (''Beautiful
  design'' -> gold design, pred appearance). Plain ''color'' (FN=3, distinct from the already-demonstrated
  ''color accuracy'' photo-mismatch sense) is confirmed by two more worst-20 reviews (B093Y8K7D8#7: ''Colorful
  for summer and autumn decor'' -> gold color, pred appearance; B07RLZQ987#2: ''Faded yellow not bright
  at all'' -> gold color, pred color accuracy). Neither ''design'' nor plain ''color'' has ever been demonstrated
  anywhere in the prompt -- only ''appearance'' and ''color accuracy'' exist as visual-domain facets --
  so the model has no precedent that these are legitimate, separate dimensions, and defaults to the catch-all
  it knows (appearance), the same undemonstrated-facet failure shape that made durability and books work
  last round. Edit 2 adds one synthetic sunglasses example isolating ''design'' and ''color'' with vocabulary-aligned
  evidence, without touching appearance or color accuracy. I deliberately did NOT touch the size/sizing-accuracy/fit/length
  cluster again this round: three worst-20 reviews do implicate it (B08NV5452X#3, B07VC791X3#3, B01BI85NTA#7),
  but unlike the two edits above, those three each point to a DIFFERENT correct gold facet (length, size,
  fit respectively) all being collapsed into ''sizing accuracy'' -- a three-or-four-way disambiguation,
  not a clean pairwise contrast, and exactly the shape of complexity that killed the rule-block attempts
  at gi1/gi4. Per gi8/gi9''s own reasoning this area is still flagged risky; a future round should revisit
  it once one sub-pattern (e.g. size specifically, or length specifically) clearly dominates rather than
  three scattered singleton failures.'
change_summary: '1) Relabeled the stuffed-elephant few-shot example''s second aspect from ''build quality''
  to ''durability'' (same evidence ''the seams are still tight and none of the stitching has come loose...
  after a year of daily hugs and two trips through the washing machine'', same positive polarity) -- resolves
  a direct contradiction with gi9''s own tow-strap durability definition, targets the single largest FP
  mass in the report (build quality=16), confirmed by the #1 worst-scoring review B00SSG8XDY#1 (gold durability,
  pred build quality), and gives durability its first positive-polarity demonstration. 2) Added a new
  synthetic sunglasses few-shot example demonstrating ''design'' (positive: ''a sleek cat-eye design that
  gets compliments every time I wear them'') and ''color'' (positive: ''the tortoiseshell color is rich
  and warm, definitely a statement piece on its own'') as facets distinct from the already-demonstrated
  ''appearance'' and ''color accuracy'' -- targets design''s symmetric FP=5/FN=5 mass and color''s FN=3
  mass, confirmed by three worst-20 reviews (B07ZX3K9S4#4, B093Y8K7D8#7, B07RLZQ987#2) where the model
  substituted ''appearance'' or ''color accuracy'' for gold''s ''design''/''color'' because neither has
  ever been shown as a standalone facet. Left all rule bullets untouched (rule edits failed twice at gi1/gi4),
  left the size/sizing-accuracy/fit/length cluster untouched despite three confirming worst-20 instances
  because they implicate three different correct facets rather than one clean contrast, and left the tow-strap/book/air-purifier
  examples untouched. Few-shot count grows from 11 to 12, well under double the v2 baseline''s 7. No dev
  review text copied; both edits fully synthetic.'
version: gi10
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
few_shot:
- user: |-
    These boots have amazing arch support and great grip on wet trails, but they are not really waterproof - my socks were soaked after an hour of light rain.
  assistant:
    aspects:
    - facet: arch support
      polarity: positive
      evidence: amazing arch support
    - facet: traction
      polarity: positive
      evidence: great grip on wet trails
    - facet: waterproofing
      polarity: negative
      evidence: not really waterproof - my socks were soaked
- user: |-
    Love it!!! Five stars.
  assistant:
    aspects: []
- user: |-
    Runs small, order a size up. Also the box arrived crushed but the seller shipped a replacement quickly.
  assistant:
    aspects:
    - facet: sizing accuracy
      polarity: negative
      evidence: Runs small, order a size up
- user: |-
    Muy comodo y el material se siente de buena calidad, aunque el color es mas oscuro que en las fotos.
  assistant:
    aspects:
    - facet: comfort
      polarity: positive
      evidence: Muy comodo
    - facet: build quality
      polarity: positive
      evidence: el material se siente de buena calidad
    - facet: color accuracy

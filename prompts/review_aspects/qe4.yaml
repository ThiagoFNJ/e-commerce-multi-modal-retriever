reflector: sonnet subagent, template_v1
notes: 'functionality remains by far the dominant FP mass (44, still more than 4x the next category) despite
  qe3''s allow-list narrowing (52 -> 44); the single worst dev review, B0795G58DL#1 (f1=0.0, fp=6 fn=4),
  shows why: a review describing four genuinely distinct capabilities (wifi setup, a companion app, raw
  charging behavior, worldwide voltage compatibility) gets six ''functionality'' predictions with mixed
  polarities, filling the entire 6-facet cap and crowding out gold''s setup/app/included-accessories/compatibility
  entirely. This also reveals the existing dedup rule does not stop repeated ''functionality'' emissions
  in practice even though it is phrased to forbid repeats, so the fix makes the cap explicit and facet-specific
  (''functionality'' at most once per review) rather than relying only on the general dedup prose, and
  extends the specific-mechanism allow-list with ''installation/setup'' and ''software (including a companion
  app)'' since ''installation'' is a top-15 missed gold facet (3) that never appeared anywhere in the
  prompt''s vocabulary before now. A new worked example (9) models exactly this multi-capability pattern
  synthetically (smart-plug setup friction + app quality + one holistic functionality claim), since qe3''s
  own notes already established that prose-only rules regress while worked examples improve score, and
  this is the highest-value remaining lever given functionality''s error mass. ''performance'' (5 FP)
  and ''user experience'' (4 FP) are folded into the same functionality restriction since the aggregate
  evidence shows the same generic-satisfaction-word pattern at smaller scale, at no extra cost.


  The build quality / durability / reliability cluster is now the second largest coherent problem: durability
  is FP 13 while build quality is FN 13 -- almost exactly matched counts, meaning the model is very likely
  calling gold''s ''build quality'' cases ''durability'' at close to a 1:1 rate. B000EOOQPW#11 (gold build
  quality: negative, pred durability: negative) shows the mechanism directly: ''It is not well made like
  before'' is a static solidity judgment phrased as a comparison, not observed wear, but the model''s
  temporal-sounding phrase ''like before'' apparently triggers ''durability''. The rule is rewritten with
  explicit cue-word lists for build quality (static/comparative judgments, including material feel) vs
  durability (gradual wear cues) vs the newly-introduced ''reliability'' (10 FP, second-largest new mass,
  with essentially zero corresponding recall gain since it no longer appears in the missed-facet top 15)
  -- reliability is narrowed to require a discrete failure EVENT, since without that constraint it is
  absorbing cases that belong to build quality/durability or to nothing at all. ''material quality'' (10
  FP) is a self-inflicted problem: it has zero support in the system rules'' vocabulary, so its only source
  is few-shot example 4, which uses it for ''el material se siente de buena calidad'' -- a textbook static
  well-made judgment. That example''s facet is corrected to ''build quality'' (consistent with the new
  cluster rule) and the rule text now explicitly states material-feel language belongs to build quality,
  closing the leak at both the instruction and example level. This is the second of the two allowed example
  edits.


  ''value'' + ''value for money'' remain the second-largest FP mass overall (23+6=29) even though qe2/qe3
  already exclude price/cost language -- B01BPJLC6U#0 (pred ''value: positive'', fp) shows the leak is
  not about money at all: the review never mentions price, but the model applies ''value'' to overall-worth-having
  language (''a must-have'', ''should never go ... without it''). The exclusion is broadened to explicitly
  cover generic recommendation/satisfaction language that is not tied to a concrete product dimension,
  independent of whether money is mentioned.


  Appearance (20 FP) plus design (4 FN), style (4 FN), and color (3 FN) missed together show the same
  holistic-catch-all failure pattern as functionality, just for the visual-dimension family: B07ZX3K9S4#4
  (''Beautiful design'' -> gold ''design'', pred ''appearance''), B093Y8K7D8#7 (gold ''color'', pred ''appearance''),
  and B098YSJ4RP#4 (gold ''color''+''build quality'', pred only ''appearance'', dropping build quality
  entirely) all show ''appearance'' absorbing what gold treats as the narrower ''color'' or ''design''
  facet. The appearance rule is split the same way the functionality rule was narrowed in qe3: reserve
  ''appearance'' for overall/multi-element visual commentary, and use ''color'' or ''design'' when the
  review comments on only that one visual element.


  No changes were made to size/sizing accuracy (FP 7/7, FN size 5) or included accessories (FP 5, FN 4)
  this round -- both show smaller, roughly balanced FP/FN mass with no single clear direction of confusion
  visible in the worst-review evidence, so a rule change there would be guessing rather than evidence-grounded;
  deferred to a future round if the mass grows or a clearer error pattern emerges.'
change_summary: '1. Restricted ''functionality'' to at most one emission per review, and folded ''performance''
  and ''user experience'' into the same restricted-synonym rule -- targets the still-dominant FP mass
  (44) and the literal 6x-repeated-functionality failure in the worst dev review (B0795G58DL#1).

  2. Added ''installation''/''setup'' and ''software (including a companion app)'' to the specific-mechanism
  allow-list that functionality must defer to -- ''installation'' is a top-15 missed gold facet (3) that
  had no vocabulary entry anywhere in the prompt.

  3. Added explicit instruction to give each distinct product capability (hardware, app, setup, compatibility)
  its own facet instead of collapsing them into repeated functionality entries -- directly targets B0795G58DL#1''s
  fp=6/fn=4 failure.

  4. Rewrote the build quality / durability / reliability cluster with explicit cue-word disambiguation
  (static solidity + material feel -> build quality; gradual wear over time -> durability; discrete failure
  event -> reliability) -- durability (FP 13) and build quality (FN 13) are near-exact matched masses
  indicating systematic mislabeling, and reliability (FP 10, newly introduced by qe3) had absorbed cases
  with essentially no matching recall gain.

  5. Folded ''material quality'' into ''build quality'' in the rule text (material feel is now explicitly
  build quality) and corrected few-shot example 4''s facet from ''material quality'' to ''build quality''
  -- ''material quality'' has zero support in the system vocabulary and its only source was that example;
  it is the 6th-largest FP mass (10).

  6. Broadened the value/recommendation exclusion to cover generic purchase-satisfaction language (''must-have'',
  ''highly recommend'') even when no price or cost is mentioned -- B01BPJLC6U#0 shows ''value'' firing
  with zero price language in the review; value + value for money remain the 2nd-largest FP mass (29)
  after qe2/qe3''s cost-only exclusion.

  7. Split the appearance rule so color-only or design-only commentary uses those specific facets instead
  of ''appearance'', reserving ''appearance'' for overall/multi-element visual commentary -- appearance
  is the 3rd-largest FP mass (20) while design/style/color are missed 11 times combined, and three worst-scoring
  reviews (B07ZX3K9S4#4, B093Y8K7D8#7, B098YSJ4RP#4) show appearance absorbing exactly these narrower
  gold facets.

  8. Added new few-shot example 9 (smart-plug setup + app + functionality): demonstrates installation
  and software as distinct facets alongside a single holistic functionality claim, modeling the multi-capability
  pattern that B0795G58DL#1 got catastrophically wrong.

  9. No change to size/sizing accuracy or included accessories this round -- evidence for those masses
  is smaller and not clearly directional; deferred pending stronger signal.'
version: qe4
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life', 'appearance', 'build quality', 'reliability', 'installation', 'color', 'design'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, and any interaction with the seller or manufacturer after purchase -- customer service, customer support, technical support, response time to inquiries, communication, warranty claims -- none of these are aspects of the product itself. Also ignore money entirely: any mention of cost, price, or affordability ('worth it', 'good value', 'reasonable price', 'overpriced', 'expensive', 'cheap', 'pricey', a dollar amount) never creates a 'value', 'value for money', or 'price' facet, even when cost is framed as a quality judgment. Likewise, ignore generic recommendation or purchase-satisfaction language that is not tied to any specific product dimension -- 'must-have', 'so glad I bought this', 'highly recommend', 'worth having', 'a marvel' -- this describes the purchase decision or overall sentiment, not a product dimension, and must NOT become a 'value' facet or any other facet; only extract an aspect when a concrete dimension of the product itself is named or clearly implied.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - How the product looks BY DESIGN is a small family of facets, not always 'appearance': use 'appearance' when the review comments on the overall look, or on more than one visual element together (color + style + finish); if it comments ONLY on color, use 'color' instead; if it comments ONLY on the shape, silhouette, or design choice (not color, not damage), use 'design' instead. Damage, defects, or physical state on arrival (cracked, scratched, burned, broken, stained, dirty) is a different facet, 'condition' -- never call physical damage 'appearance'.
  - Items or parts bundled with the product are 'included accessories'.
  - Prefer generic canonical names over task-specific compounds so near-synonyms don't fragment. The largest source of naming errors is one closely related cluster -- disambiguate it carefully: 'build quality' is a STATIC assessment of how solid, sturdy, or well-assembled the product is or feels right now, including how its materials feel ('flimsy plastic', 'feels cheap', 'feels premium' are all build quality -- never a separate 'material quality' facet) and comparisons to expectations or to a prior version ('not as well made as before' is build quality, not durability, unless the review actually describes wear happening during use). 'durability' is strictly GRADUAL degradation observed during use over time (cues: 'after weeks/months/uses', 'wore out', 'fell apart over time', 'started fraying'). 'reliability' is a discrete failure, breakdown, or malfunction EVENT during use (cues: 'stopped working', 'broke', 'jammed', 'glitched', 'died', 'stopped turning on') -- do not use it for speculation about future failure or general skepticism where no failure is actually described. Elsewhere: 'effectiveness' (not 'cleaning power', 'scalp massage effectiveness'); 'size' for whether the product's own dimensions/capacity are adequate (not 'sizing accuracy', which is reserved for whether the ordered size runs true to expectation). 'functionality' -- and its synonyms 'performance' and 'user experience' -- is NOT a catch-all default: use 'functionality' ONLY for a holistic 'do the promised features work at all' claim when no more specific attribute is mentioned, and never emit it more than once per review. If the review names or clearly implies a specific mechanism instead -- suction, grip/traction, stability, mounting, heat management, transfer speed, cord/wiring, hand/needle alignment, software (including a companion app), installation or setup, compatibility, ease of use, ease of attachment, ease of cleaning -- use that specific name, not 'functionality'. When a review touches several distinct capabilities of the same product (e.g. the physical hardware, a companion app, the first-time setup, compatibility with other devices or regions), give EACH capability its own specific facet instead of collapsing them into repeated 'functionality' entries.
  - Facets apply to any product type, including media (books, movies, games): 'plot', 'characters', 'writing quality' are valid facets under the same schema.
  - Deduplicate facets: never output the same facet name twice in one response, even if the review expresses mixed or conflicting opinions about it -- merge into a single entry (pick the dominant sentiment, or 'neutral' if genuinely mixed). At most 6 facets, the most salient. If the review discusses no concrete product dimension, return an empty list.
few_shot:
- user: |-
    These boots have amazing arch support and great grip on wet trails, but they are not really waterproof - my socks were soaked after an hour of light rain.
  assistant:
    aspects:
    - facet: arch support
      polarity: positive
      evidence: amazing arch support
    - facet: traction
      polarity: positive
      evidence: great grip on wet trails
    - facet: waterproofing
      polarity: negative
      evidence: not really waterproof - my socks were soaked
- user: |-
    Love it!!! Five stars.
  assistant:
    aspects: []
- user: |-
    Runs small, order a size up. Also the box arrived crushed but the seller shipped a replacement quickly.
  assistant:
    aspects:
    - facet: sizing accuracy
      polarity: negative
      evidence: Runs small, order a size up
- user: |-
    Muy comodo y el material se siente de buena calidad, aunque el color es mas oscuro que en las fotos.
  assistant:
    aspects:
    - facet: comfort
      polarity: positive
      evidence: Muy comodo
    - facet: build quality
      polarity: positive
      evidence: el material se siente de buena calidad
    - facet: color accuracy
      polarity: negative
      evidence: el color es mas oscuro que en las fotos
- user: |-
    This blender looks sleek on the counter and matches the rest of my kitchen. It came with three different-sized jars and a recipe booklet, which was a nice bonus. The plastic base feels flimsy and rattles a bit at high speed, and after about six weeks of daily use one of the gears started grinding and it eventually stopped turning on. When it did work, it pureed frozen fruit smoothly every time.

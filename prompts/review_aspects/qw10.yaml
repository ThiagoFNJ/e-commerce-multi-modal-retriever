notes: 'The camera review (B01GHVIU70#3, f1=0.0, fp=5/fn=2) is this round''s single worst-scoring review,
  and its failure mode -- extracting facets entirely about a comparison product -- is exactly what qw9
  itself targeted via the blender example and the pre-existing comparison-product exclusion rule. Yet
  post-qw9 the camera review fails identically, showing the fix did not generalize: qw9''s blender example
  gave the alternative product only one brief clause, while the camera review is almost entirely enumerated
  Panasonic specs (five separate comparison points) with the two real gold facets mentioned only in passing.
  This round closes that gap two ways -- extending the rule text to explicitly cover reviews where most
  of the text describes the alternative, and rewriting the blender example to be comparison-dominant (multiple
  enumerated alternative specs before two brief real facets) so the demonstration matches the camera review''s
  actual shape. Second, the peel-and-stick review (B007D53QRE#9, f1=0.0, annotator rationale ''listing
  accuracy is not a feature of the product'') is also unchanged after qw9''s fix attempt: the model still
  predicts ''product description accuracy'' and misses ''installation''. qw8 already tried strengthening
  this exact rule''s text alone and scored below qw3 (0.5603), so this round does not touch the rule text
  again; instead it gives the exclusion its own dedicated few-shot example (previously it shared one example
  with the comparison-product fix, diluting both demonstrations) that explicitly redirects a listing/description
  mismatch to the real underlying facet the annotator identified (installation) rather than a meta ''accuracy''
  facet. Third, ''sturdiness'' (aggregate FN=3) is added to the generic-name vocabulary purely additively:
  the strobe-light worst review (B01BPJLC6U#0, gold ''sturdiness'', pred ''build quality'') shows the
  model has no name for this concept and defaults to a near-neighbor that the 0.80 embedding threshold
  does not accept as equivalent -- this mirrors the low-risk additive pattern that already worked for
  ''condition'', ''stability'', and ''content quality'', rather than the narrowing-rule pattern that has
  repeatedly failed for ''value'' and ''functionality''. Value and functionality rule text remain untouched
  this round (four combined prior rounds -- qw4, qw5, qw6, qw7 -- already tried and underperformed qw3
  there); appearance and content-quality wording are also left as qw9 set them, since post-qw9 evidence
  shows modest improvement there (appearance FN 13->12, FP 7->6) and no new large-mass pattern in this
  round''s evidence justifies touching them again. Other mismatches visible in this round''s worst-review
  list (cup size vs capacity, color payoff vs color visibility, style vs appearance, a fit/size direction
  disagreement, ingredients vs ingredient accuracy, hand alignment, sound quality vs noise, completeness
  vs delivery speed) are each single occurrences with no supporting aggregate mass, so they are left untouched
  as under-evidenced, consistent with prior rounds'' practice of not chasing single-review noise.'
change_summary: '1) Extended the comparison-product exclusion rule to explicitly state it applies even
  when most of the review describes the alternative product, closing the gap exposed by the camera review
  (f1=0.0, fp=5/fn=2, still failing identically after qw9''s own targeted fix). 2) Rewrote the blender
  few-shot example to be comparison-dominant (several enumerated alternative-product specs before two
  brief real facets), matching the camera review''s structure instead of the single brief aside used previously.
  3) Removed the listing-accuracy sub-plot from the blender example (it was sharing -- and diluting --
  one demonstration between two different exclusions) and added a new, separate few-shot example (bathroom
  mirror) isolating the listing/description-mismatch exclusion and redirecting it to the real underlying
  facet (''installation'') rather than a meta accuracy facet; targets the peel-and-stick worst review
  (f1=0.0, annotator rationale ''listing accuracy is not a feature of the product''), still failing identically
  after qw9''s shared example. Rule text for this exclusion is deliberately left untouched since qw8 already
  tried strengthening it and scored below qw3. 4) Added ''sturdiness'' to the generic-name-preference
  vocabulary list, purely additively, distinguished from ''build quality'' and ''durability''. Targets
  sturdiness''s FN=3 aggregate and the strobe-light worst review (gold ''sturdiness'', pred ''build quality'')
  -- the same low-risk additive pattern that already worked for ''condition'', ''stability'', and ''content
  quality''. Deliberately not touched: the ''value'' rule (qw4, qw6 both narrowed it and scored below
  qw3), the ''functionality'' bullet text (qw5, qw7 both rewrote it and scored below qw3), and the appearance/content-quality
  wording added last round (already showing modest improvement, no new large-mass evidence this round).'
version: qw10
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'waterproofing', 'battery life', 'appearance'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'the case doesn't flex when squeezed' -> facet 'build quality', polarity 'positive'.
  - Product-intrinsic only: ignore delivery, shipping (including shipping speed and how fast it arrived), the condition of the packaging or box itself (as opposed to the product), the seller, and customer service / support interactions -- they are not aspects of the product. The raw price paid is not a facet, but 'value' -- whether the product's quality or features justify its price, a worth-it-or-not judgment -- is a legitimate, distinct facet. Ignore whether the listing, description, or photos accurately represented the product (a listing-accuracy complaint is not a product aspect) -- if a specific quality is being praised or criticized, name that quality instead. Ignore a single defective or damaged-on-arrival unit that was promptly replaced or resolved and is not described as an ongoing or general flaw -- that is a one-off fulfillment incident, not a product-quality aspect, even when paired with customer-service praise. If the review compares the product being reviewed to a different, alternative product, only extract facets about the product actually being reviewed -- ignore specs or opinions attributed to the alternative, even when most of the review is spent describing the alternative product in detail.
  - Never the product category itself ('boots' is not a facet of boots); no brand names. Never prefix a facet with the product, its category, or a component name either -- write the bare dimension: 'durability' not 'charger durability', 'video transfer' not 'dvd transfer quality', 'compatibility' not 'charger compatibility'.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Facet naming: use the simplest, most generic dimension name that fits -- near-synonyms are scored as mismatches against the gold vocabulary. Choose carefully among these frequently-confused neighbors:
    - 'sizing accuracy' (not 'size') is for whether the item's labeled/ordered size runs true -- 'runs small', 'order a size up', 'true to size'.
    - 'size' is for the product's own literal dimensions or magnitude when no true-to-size judgment is being made -- 'cup size', 'fits my small apartment'.
    - 'fit' is for how snugly or comfortably the product fits a body or space once in use, not a true-to-size claim.
    - 'assembly' is for putting a multi-part product together from pieces; 'installation' is for mounting, attaching, or setting up a product to be used.
    - 'build quality' is for the solidity/craftsmanship of construction -- 'feels solid', 'doesn't flex', 'fell apart'. 'durability' is for withstanding wear, damage, or breakdown over repeated use or time -- 'still works after months', 'scratches easily', 'broke after a week'.
    - 'stability' is for whether the product stands, balances, or stays in place without tipping, wobbling, or sliding -- distinct from 'build quality' (solidity of construction) and 'durability' (wear resistance over time).
    - 'color' is for hue/tint/shade specifically; 'design' is for styling or shape choices; 'style' is for overall fashion/aesthetic-language preference; 'appearance' is only for a general look/aesthetic impression not already covered by color, design, style, scratch resistance, or condition, and not when the review's complaint is really about a specific named component or a non-visual sensation (a zipper, a strap, comfort, fit) -- in that case name the specific part or sensation instead of defaulting to 'appearance'.
    - 'condition' is for the item's physical state from wear, damage, dirt, or how it arrived or aged -- 'a scuff on arrival', 'filthy', 'cover looks dragged down a road' -- distinct from 'appearance' (an intentional aesthetic/design impression) and from 'build quality'/'durability' (structural solidity and wear resistance).
    - 'scratch resistance' is for whether a surface resists scratches or marks.
    - 'reliability' is for whether the product keeps working without failing or malfunctioning over time -- use it even when the complaint text centers on contacting support about the failure (the failure itself is 'reliability', the support interaction is excluded) -- UNLESS the review describes only a single defective-on-arrival unit that was promptly replaced, which is not a reliability aspect (see the fulfillment-incident exclusion above).
    - 'functionality' is for a holistic does-it-work-as-intended judgment about the product's core purpose, ONLY when no more specific mechanism or action is named in the review -- prefer a specific action/mechanism facet instead whenever the review names one, e.g. 'dispensing', 'organization', 'adjustability', 'educational value', 'ease of cleanup'; don't default to 'functionality' as a catch-all for a review describing a particular task or feature.
    - Other generic names to prefer over narrower compounds: effectiveness, capacity, included accessories, plot, characters, dialogue, pacing, engagement, entertainment, content quality (for the substantive quality or richness of information/subject matter in non-fiction, reference, or educational media -- distinct from 'educational value', which is specifically about learning or instructional benefit, and from 'plot'/'characters', which are for fiction narrative), sturdiness (robustness against being dropped, knocked, sat on, or roughly handled -- distinct from 'build quality', which is about the solidity/craftsmanship of construction, and from 'durability', which is about withstanding wear over time).
  - Deduplicate facets. At most 6, the most salient -- but most reviews genuinely have only 2-4 clear aspects. Never pad the list with generic or weakly-supported facets (e.g. 'user experience', 'versatility', 'additional features') just to approach the cap. If the review discusses no concrete product dimension, return an empty list.

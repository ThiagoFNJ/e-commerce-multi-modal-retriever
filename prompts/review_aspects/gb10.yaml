notes: 'This round returns to gb6 as parent (gb6''s own three children -- gb7''s CONSOLIDATE-rule expansion
  for same-dimension-via-different-phrasing, F1 0.4816; gb8''s ban on physical-part/component nouns as
  facets, F1 0.4842; gb9''s short-but-specific-review distinction, F1 0.4853 -- all scored worse than
  gb6''s 0.5037), so this round avoids re-trying those three directions and grounds new edits in gb6''s
  own measured results instead. Two patterns dominate the evidence and both are cases where a PROSE rule
  has already been restated once (dedup) or added once (appearance) in a prior round and, despite that,
  the aggregate metrics and worst-review set show the exact same failure recurring in gb6''s own output
  -- so this round''s hypothesis is that these two issues are enforcement/imitation problems for this
  small model, not comprehension problems, and switches levers from more prose to worked few-shot examples
  instead. (1) Dedup: gb6''s own worst reviews show catastrophic duplicate-facet output that a second
  round of prose (''mandatory re-scan'') did not fix -- B08NV5452X#3 output ''fit'' five times (gold:
  a single ''length'' facet) and B01N2U5J5U#1 output ''build quality'' four times (gold: ''stability''/''part
  fit''). These two reviews alone account for up to 9 of the 16 ''build quality'' and 10 ''fit'' false
  positives in the aggregate top-FP list -- the single largest concentrated error mass in this round''s
  evidence. Rather than restate the dedup instruction a third time (which has now failed twice), this
  round adds one new synthetic few-shot example demonstrating the mechanical pattern directly: a review
  that describes the same underlying failure through several different sub-parts and different wording
  (three separately-phrased wobble complaints about a chair) collapsing to ONE facet, alongside a second,
  genuinely distinct facet -- showing dedup applies only to repeated mentions of the same dimension, not
  to everything. This targets the mechanism, not the rule text, since the rule text is already correct
  but not being followed. (2) Appearance: it remains the single largest missed-facet mass (15) even after
  gb6''s targeted protection clause, and B07BHKVZPX#8 -- one of the two worst reviews gb6''s own rationale
  named as a target -- still misses appearance entirely in gb6''s own worst-review set (''looks like Quality
  without looking feminine'' -> predicted only ''versatility''). The existing few-shot examples that include
  appearance (blender, drone) both present it as a clearly foregrounded clause, not a brief secondary
  aside, so the model has no worked example of the exact failure mode the prose rule is trying to prevent.
  This round adds one new synthetic example (phone case) where a brief, parenthetical appearance remark
  (''a really pretty shade of teal, which was a nice bonus'') sits next to a more substantial protection
  claim, and both are extracted as separate facets -- directly modeling B07BHKVZPX#8''s structure without
  copying its text. No system-rule prose is changed this round: both the dedup and appearance rules already
  state the correct behavior clearly (added/reinforced in gb2 and gb6 respectively), and the evidence
  shows the gap is between stating the rule and the model following it, which a rule rewrite cannot address
  a third time -- this round tests whether worked examples close that gap instead.'
change_summary: '1. No system rule text changed. Both the dedup rule and the appearance-protection clause
  already state the intended behavior correctly (reinforced in gb2 and gb6); the evidence shows a third
  round of prose restatement is unlikely to help, since gb6''s own worst-review set still shows both failures
  at full severity despite the prior fixes. This round switches levers to worked examples instead.

  2. Added few-shot example 11 (folding chair, synthetic): demonstrates that three differently-worded
  mentions of the same underlying failure (left leg wobbles, right leg wobbles, seat flexes) collapse
  to ONE ''stability'' facet, alongside a second, genuinely distinct ''portability'' facet -- targets
  the mechanical dedup failure directly responsible for up to 9 of the 26 combined ''build quality''/''fit''
  false positives in the aggregate stats (B08NV5452X#3: 5x duplicate ''fit''; B01N2U5J5U#1: 4x duplicate
  ''build quality'').

  3. Added few-shot example 12 (phone case, synthetic): demonstrates a brief, secondary appearance aside
  (''a nice bonus'') sitting next to a more substantial product claim, with both extracted as separate
  facets -- targets appearance''s continued status as the largest missed-facet mass (15) and B07BHKVZPX#8,
  a review gb6''s own rationale already targeted for this exact pattern and which still misses appearance
  entirely in gb6''s measured results.'
version: gb10
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'build quality', 'sizing accuracy', 'ease of use'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, and anything about buying or owning the product rather than the product itself. Specifically exclude: the price paid, value for money, cost, and whether it's "worth it" or a "reasonable price"; listing/description accuracy; and customer service in any form -- support responsiveness, replacement-parts availability, warranty handling, how fast or slow the seller/manufacturer replied. If a sentence mixes a real product complaint with a service/support complaint (e.g. "the charger stopped working and support never replied"), extract only the product part. The RELATIVE LENGTH of a complaint does not decide what to extract: a single short clause naming a genuine product detail is still extractable even if it's buried inside a much longer listing/seller/shipping/service complaint, and a long service or support complaint is still fully excluded even if it dominates the review -- judge each clause by what it's about, not by how much of the review it takes up.
  - Never the product category itself ('boots' is not a facet of boots); no brand names; never a named character, person, actor, or title -- for books, movies, and other creative works, name the CRAFT dimension being judged instead: 'plot', 'characters', 'writing quality', 'content quality', 'pacing', 'engagement' (how compelling or hard to put down it is), 'emotional impact' (how moving or affecting it is), 'humor' (how funny it is), 'video quality', 'audio quality' -- never the character's, author's, or performer's name.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - CONSOLIDATE: if several sentences all describe the same underlying dimension (e.g. multiple specific examples of the product working, or not working, as intended), report ONE facet for that dimension, not one per example. Most reviews need only 1-3 facets; use more only when the review clearly discusses several distinct dimensions.
  - Name the SPECIFIC dimension the review is actually about -- 'installation', 'assembly', 'adjustability', 'cord length', 'cup size', 'subtitles', 'ingredient transparency', 'included accessories' are all better facets than a vague bucket term when the review is clearly about that specific thing. Only fall back to one of these broad names when the review is genuinely about the general quality and no more specific name fits: effectiveness (does it achieve its core purpose), functionality (do its features work as intended), reliability (does it keep working, without failing or breaking down, across repeated use), build quality (construction, sturdiness -- including a ONE-TIME breakage, crack, or falling apart, e.g. "fell apart as I unpacked it"), durability (holds up over an EXTENDED period of repeated wear or use -- only use this when the review itself frames it that way, e.g. "after six months of daily use"; a single immediate failure is build quality, not durability), appearance (look, style, design, color, finish -- these are all the same dimension; any visual/cosmetic remark, even a brief aside like "it was pretty" or "looks like quality", is appearance and must not be dropped from the output just because another facet in the same review seems more substantial), size (actual physical dimensions), sizing accuracy (fit relative to the size ordered), ease of use (day-to-day operation, not a one-time setup step like installation or assembly), material, comfort.
  - Deduplicate facets: never output the same facet name twice in one review, even if it comes up in several sentences (see CONSOLIDATE). Before returning your answer, re-scan the facet list you are about to output and merge or remove any repeated name -- this check is mandatory even when you're confident you already deduplicated while composing. At most 6 facets, the most salient. If the review discusses no concrete product dimension, return an empty list.

notes: 'gm3 (F1 0.6384) remains the best node in this model''s entire lineage, and the six rounds since
  it -- gm4, gm5, gm6, gm7, gm8, gm9 -- form an unusually clean natural experiment: every one of them
  scored below gm3 (0.6060, 0.5837, 0.5881, 0.5894, 0.5907, 0.5902), despite trying essentially every
  lever the protocol allows and hitting nearly every large error mass in the table. Tightening material
  vs. build quality vs. softness (gm4), rewriting the material definition (gm5), and adding a formal effectiveness
  definition (gm6) all touched the five-term distinctions bullet directly and all regressed. Extending
  the ''performance'' ban with an explicit fallback (gm7, gm8) was tried twice and regressed both times.
  Promoting ''fit'' out of the catch-all into a defined preferred term distinct from ''sizing accuracy''
  -- exactly the edit the leg-opening review (B01BI85NTA#7: ''Extremely large at the bottom of leg opening'',
  gold ''fit'', predicted ''sizing accuracy'') calls for -- was tried three times in a row with different
  wording (gm7, gm8, gm9) and regressed all three times. Sharpening color vs. appearance to fix the hair-chalk
  review''s fallback to the banned ''performance'' term (gm9) also regressed. And gm7, which deliberately
  left the five-term bullet untouched, still regressed on its other edits. The one variable never held
  constant across all six rounds is the few-shot set: every single child added exactly 2 new synthetic
  examples on top of gm3''s 8, growing it to 10 each time, so the ''rule tightening hurts'' hypothesis
  and the ''few-shot growth/churn hurts'' hypothesis have never been separated -- every regression could
  equally be attributed to either. Given nine total edit attempts (six full rounds, several touching multiple
  levers each) have now failed regardless of which specific rule was touched, re-touching the distinctions
  bullet, the performance ban, the near-synonym bullet (color/design/appearance/fit/sizing accuracy),
  or the few-shot set for a tenth time -- even in service of the largest error masses (build quality FP13,
  material FP11, appearance FN9, durability FP8, effectiveness FN7, functionality FN6, fit FN4/FP3) --
  would be re-proposing edit types that have already failed, which the protocol explicitly rules out.
  So gm10 runs the one clean, never-yet-isolated test: it changes nothing in the distinctions bullet,
  the near-synonym bullet, or the few-shot examples (kept byte-for-byte identical to gm3''s 8 examples
  -- the first child in this lineage to make zero few-shot changes), and makes exactly one edit, entirely
  inside the low-priority catch-all vocabulary bullet, which the reflection protocol itself flags as a
  legitimate lever independent of any logic change: under the 0.80 cosine-similarity match threshold,
  several worst-scoring reviews show the model landing on the right concept but the wrong word, missing
  the threshold against gold -- ''leakage'' predicted where gold says ''leak protection'' (B0078T9PKW#4),
  ''durability''/''ease of cleaning'' predicted where gold says ''longevity''/''erasability'' (B01LY9H349#4),
  ''build quality'' predicted where gold says ''assembly'' (B07K8K9P8N#6) or ''hand alignment'' (B00ILUP0VU#12),
  ''ease of attachment'' predicted where gold says ''clip strength'' (B085KZGS5S#4), and nothing predicted
  where gold says ''authenticity'' (B07V49HKZF#1, ''Original real leather case from Samsung''). I added
  these exact gold words -- plus ''compatibility'', ''weight'', ''listing accuracy'', and ''content quality''
  from the aggregate missed-facet table, and ''ingredients'' and ''case quality'' from the hair-chalk
  and ingredient-mismatch worst reviews -- to the catch-all list as pure vocabulary, changing no boundary,
  no priority order, and no example. This isolates the vocabulary-alignment lever for the first time in
  the whole loop, while leaving untouched everything that has a documented history of hurting this model
  when edited.'
change_summary: 'Left the five-term functionality/reliability/durability/build-quality/material distinctions
  bullet, the ''performance'' ban, the near-synonym bullet (appearance/color/design/size/sizing accuracy/included
  accessories), and all 8 few-shot examples completely unchanged -- nine prior edit attempts across six
  rounds (gm4-gm9) touched one or more of these and every one scored below gm3 (0.6384), so this round
  re-touches none of them, including making zero few-shot changes for the first time in this lineage.


  Expanded only the low-priority catch-all vocabulary bullet with literal gold-facet words drawn from
  this round''s worst-scoring reviews where the model already named the right concept but missed the 0.80
  cosine-similarity threshold with a near-synonym: ''leak protection'' (predicted ''leakage'', B0078T9PKW#4),
  ''longevity'' and ''erasability'' (predicted ''durability''/''ease of cleaning'', B01LY9H349#4), ''assembly''
  (predicted ''build quality'', B07K8K9P8N#6), ''hand alignment'' (predicted ''build quality'', B00ILUP0VU#12),
  ''clip strength'' (predicted ''ease of attachment'', B085KZGS5S#4), ''authenticity'' and ''case quality''
  (no prediction at all, B07V49HKZF#1 and B06W532RC3#12), and ''ingredients'' (B0863T921B#2).


  Also added ''compatibility'', ''weight'', ''listing accuracy'', and ''content quality'' from the aggregate
  missed-gold-facet table, as pure vocabulary with no accompanying rule change.'
version: gm10
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION or discrete COMPONENT of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life', 'camera', 'speaker'. If several components share one complaint (e.g. multiple panels that all fit badly), name the shared dimension once ('fitment', 'build quality') rather than each part; name a specific component only when its opinion is genuinely distinct from the rest.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
  - Prefer the most specific concrete facet the review actually supports over a broad outcome or category term. This applies to ALL SEVEN of 'effectiveness', 'functionality', 'reliability', 'durability', 'build quality', 'material', and 'appearance': reach for one of these seven only when the review gives no more specific mechanism, feature, or quality to name -- if it names one (suction, stability, sturdiness, portability, strength, softness, mess control, organization, mounting design, ease of attachment, dispensing, storage capacity, power, battery life, software, versatility, brewing quality, and so on), use that specific term instead. Never use 'performance' as a facet: always name the specific thing that performed well or badly (power, speed, brewing quality, accuracy, ...).
  - Among those seven broad terms, when more than one could plausibly apply, use these distinctions:
    - 'functionality': the product's features or mechanisms operate as designed, including plain "it works" / "no problems" statements with no further detail given.
    - 'reliability': the product (or one of several like units) stops working, malfunctions, glitches, or behaves inconsistently -- across repeated use or after a period of time -- even if that happens later rather than immediately. A device that fails outright after months of use is a reliability judgment, not a durability one.
    - 'durability': the product's physical materials or components gradually wear, fade, weaken, or degrade over extended time or repeated use -- a condition/degradation judgment, not a stop-working judgment -- and never immediate/out-of-box defects.
    - 'build quality': how well the product is assembled or constructed -- workmanship, structural integrity, parts fitting together, or defects, including out-of-box defects -- and also any bare, undetailed statement of overall "quality" ('great quality', 'the quality is amazing') that does not itself describe the substance or fabric.
    - 'material': the substance or fabric itself, judged on its own feel, texture, or composition ('great material', 'feels like cheap plastic', 'soft fabric') -- only when the review actually describes that substance; a generic quality compliment with no substance description is 'build quality', not 'material'.
  - When a review makes many small observations that all serve one underlying theme (a long testimonial on whether a workout, tool, or treatment worked as intended) AND names no other distinct concrete dimension, extract ONE facet for that theme using the definitions above instead of several fine-grained ones that fragment it. Do not apply this consolidation to a short review that already names 1-3 distinct concrete dimensions -- extract those directly instead.
  - 'effectiveness', 'durability', 'build quality', and 'material' describe physical products or products applied to the body, and never apply to creative or informational works (books, movies, shows, music, articles). For those, use dimensions such as 'plot', 'characters', 'writing quality', 'pacing', 'humor', 'engagement', 'emotional impact', or 'entertainment value' instead.
  - Preferred terms for near-synonyms (matching is by semantic similarity, so use the left term, not the one on the right): 'appearance' for a general visual impression, finish, print, or overall look that is not framed as a design choice and not specifically about color; 'color' for a comment specifically about the product's hue or color, whether the reviewer simply likes or dislikes it or is comparing it to photos/expectations; 'design' for the product's overall styling, shape, or aesthetic/ergonomic design as a considered choice ('beautiful design', 'sleek design', 'well-designed'); 'size' for a non-wearable object's physical dimensions being too big or small for its purpose; 'sizing accuracy' only for how a wearable item runs relative to its labeled or expected size; 'included accessories' for extra items, tools, or parts bundled with the product.
  - If none of the terms above fit, name the dimension using the review's own vocabulary (e.g. 'installation', 'fit', 'condition', 'style', 'thickness', 'scratch resistance', 'ease of cleaning', 'sturdiness', 'portability', 'strength', 'softness', 'mess control', 'organization', 'mounting design', 'ease of attachment', 'dispensing', 'ingredient safety', 'educational value', 'scent', 'storage capacity', 'compatibility', 'weight', 'listing accuracy', 'content quality', 'case quality', 'clip strength', 'longevity', 'erasability', 'leak protection', 'wet strength', 'assembly', 'hand alignment', 'authenticity', 'ingredients') rather than forcing it into one of the broad terms above.

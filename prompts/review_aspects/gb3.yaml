notes: 'gb2 raised F1 to 0.4974 but precision is still 0.4621 and 20/20 worst reviews score f1=0.0, so
  I targeted the largest remaining error masses rather than new hypotheses. (1) ''durability'' is the
  single biggest unexplained FP source (FP15/FN3, i.e. almost never gold) even though it isn''t even on
  the canonical fallback list -- the model is inventing it anyway, and the build-quality bucket definition''s
  own parenthetical ''-- not durability'' seems to be priming the token. Four of the 20 worst reviews
  show it firing on the wrong dimension: B002L3TS5M#11 ''durability: positive'' for what gold calls mess
  control, B07Y5WMGGG#12 ''durability: positive'' for gold ''case quality'', B07FTS5166#6 ''durability:
  positive'' for gold ''strength'', B00IN9W73S#5 ''durability: negative'' for gold ''build quality'' (violating
  the very rule meant to prevent this substitution). So I removed the word ''durability'' from the build-quality
  parenthetical entirely and added an explicit, standalone ban redirecting to reliability/build quality/a
  more specific term. (2) ''effectiveness'' is the second-biggest unexplained FP source (FP15/FN2) and
  in the worst-review evidence it is substituting for gold terms that are more specific but simply weren''t
  on offer in the specific-dimension example list: B004PBIKHU#1 gold ''performance'' -> pred ''effectiveness'';
  B088H3P77R#7 gold ''power'' -> pred ''effectiveness''. I added ''performance'' and ''power'' to the
  good-specific-name examples so the model reaches for them before the generic bucket term. (3) ''value
  for money'' (FP13) is still leaking despite gb2''s rule rewrite -- B088H3P77R#7 (''reasonable price'')
  and B07XH3F5NN#8 (''waste of money'') are fresh worst-review leaks this round -- so text-only enumeration
  isn''t sufficient; I added a specific clause about brief positive price asides attached to a real compliment,
  plus a new worked example, since gb2''s own postmortem already noted ''a worked example alone clearly
  isn''t enough'' and neither is rule text alone -- both together are more likely to stick. (4) customer-service
  exclusion (FP7) still leaks specifically in the case where the service complaint is the ONLY other content
  besides one product complaint (B07ZHYS7MD#6: 3 FPs including a literal-part-name facet ''charging station''
  instead of gold ''reliability'') -- the two existing gb2 examples both embed the exclusion inside longer
  multi-facet reviews, so I added a short single-facet example matching this exact shape, plus a rule
  clause about not using the literal broken-part noun as the facet name and about the exclusion applying
  even when the service complaint is the only other content. (5) Appearance is still the largest missed
  facet (FN14) even after gb2 merged design/style into it -- three fresh worst-review misses (B00IN9W73S#5
  ''it was pretty'', B07Y5WMGGG#12 ''just enough bling'', B07BHKVZPX#8 ''looks like Quality'') show the
  model failing to recognize brief, casual appearance cues, not a naming mismatch. I clarified the appearance
  definition to explicitly cover brief cues and folded a third demonstration into the new power-washer
  example. (6) Three of this round''s worst reviews are book reviews where gold used ''engagement''/''humor''/''emotional
  impact''/''excitement'' but the model defaulted to plot/characters/writing quality every time (1547602589#11,
  B07XB3H7HM#2, B00JNQKR8C#9) -- exactly the three terms the single existing book example teaches. That
  example was inadvertently narrowing the model''s craft-dimension vocabulary, so I expanded the creative-work
  rule''s example list rather than touching the example itself (no example budget left for a second book
  fix). (7) 1547602589#11 also shows the dedup rule violated again for creative works specifically (''plot:
  positive'' then ''plot: negative'') -- I folded a concrete same-topic-different-polarity resolution
  instruction into the CONSOLIDATE rule text. (8) B00MFYQJ0O#6 shows the model inventing a pure meta-verdict
  facet (''recommendation: neutral'') that names no product dimension at all -- added an explicit ban.'
change_summary: '1. Removed the word ''durability'' from the build-quality parenthetical and added a standalone
  ban: never output ''durability'' as a facet -- use ''reliability'', ''build quality'', or a more specific
  term instead. Targets the largest unexplained FP mass (15) and 4 of the 20 worst reviews where it substituted
  for gold mess control / case quality / strength / build quality.

  2. Added ''performance'', ''power'', and ''strength'' to the good-specific-facet-name examples, and
  noted in the effectiveness bucket definition to prefer them when they fit. Targets ''effectiveness''
  (FP15/FN2) substituting for gold ''performance'' and ''power'' in 2 worst reviews.

  3. Extended the price/value exclusion clause to explicitly cover brief positive price asides attached
  to a real compliment (''reasonable price'', ''not cheap but built well'', ''worth it''), since text-only
  enumeration alone left ''value for money'' (FP13) leaking in 2 fresh worst reviews this round.

  4. Extended the product-intrinsic exclusion rule: the service/support exclusion applies even when it
  is the ONLY other content in the review (don''t invent a standalone ''customer service''/''replacement
  parts'' facet just because nothing else is excluded-worthy nearby); and added a rule against using a
  literal broken-part noun (e.g. ''charging station'') as the facet -- name the underlying dimension instead.
  Targets B07ZHYS7MD#6 (3 FPs incl. a literal-noun facet where gold wanted ''reliability'').

  5. Clarified the appearance bucket definition to explicitly include brief casual cues (''looks great'',
  ''pretty''), not just explicit description language. Targets appearance as the single largest missed
  facet (FN14), 3 of which are fresh brief-cue misses this round.

  6. Expanded the creative-work craft-dimension example list to include ''engagement'', ''humor'', ''emotional
  impact'', ''excitement'' alongside plot/characters/writing quality, and added an instruction not to
  default to the same three every time. Targets 3 fresh worst-review book misses this round where gold
  used the newly-added terms and the model defaulted to the narrower set the existing few-shot example
  teaches.

  7. Folded a same-topic-different-polarity resolution instruction into the CONSOLIDATE rule (pick the
  dominant sentiment or use a more specific split name, never repeat a facet name). Targets 1547602589#11''s
  literal ''plot''/''plot'' duplicate.

  8. Added a ban on general verdict/meta facets (''recommendation'', ''overall quality'', ''worth buying'').
  Targets B00MFYQJ0O#6''s ''recommendation: neutral'', a facet naming no product dimension.

  9. Added few-shot example 9 (power washer, synthetic): demonstrates ''power'' and ''reliability'' over
  generic ''effectiveness''/''durability'', a brief appearance cue (''looks great''), and a price-aside
  (''not cheap, but built well for the price'') that is correctly excluded -- four fixes in one compact
  example.

  10. Added few-shot example 10 (charging dock, synthetic): a short single-facet review where a component
  fails and support never replies -- demonstrates outputting only ''reliability'' (not the literal part
  name, not a customer-service facet), reinforcing the exclusion under the specific single-facet shape
  that leaked in B07ZHYS7MD#6.'
version: gb3
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'build quality', 'sizing accuracy', 'ease of use'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, and anything about buying or owning the product rather than the product itself. Specifically exclude: the price paid, value for money, cost, and whether it's "worth it" or a "reasonable price" -- including a brief positive price aside attached to a real compliment (e.g. "quality product at a reasonable price", "not cheap but built well", "expensive but worth it"); listing/description accuracy; and customer service in any form -- support responsiveness, replacement-parts availability, warranty handling, how fast or slow the seller/manufacturer replied. This exclusion applies even when the service/support complaint is the ONLY other content in the review besides one product complaint -- extract nothing for it, never invent a 'customer service' or 'replacement parts' facet. If a sentence mixes a real product complaint with a service/support complaint (e.g. "the charger stopped working and support never replied"), extract only the product part, and name the DIMENSION the failure represents (e.g. 'reliability') rather than the literal broken part's name (e.g. not 'charging station').
  - Never the product category itself ('boots' is not a facet of boots); no brand names; never a named character, person, actor, or title -- for books, movies, and other creative works, name the CRAFT or EXPERIENCE dimension being judged instead (e.g. 'plot', 'characters', 'writing quality', 'content quality', 'pacing', 'video quality', 'audio quality', 'engagement', 'humor', 'emotional impact', 'excitement'), not the character's or performer's name. Pick whichever of these the review is actually praising or criticizing -- don't default to the same three every time.
  - Never output a general verdict or meta facet that names no product dimension, such as 'recommendation', 'overall quality', or 'worth buying'.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - CONSOLIDATE: if several sentences all describe the same underlying dimension (e.g. multiple specific examples of the product working, or not working, as intended, or two different complaints about the same book's plot), report ONE facet for that dimension with one polarity -- pick the dominant sentiment, or use a more specific facet name to split them (e.g. 'plot pacing' vs 'plot twists') if they are genuinely different dimensions. Never output the same facet name twice in one review. Most reviews need only 1-3 facets; use more only when the review clearly discusses several distinct dimensions.
  - Name the SPECIFIC dimension the review is actually about -- 'installation', 'assembly', 'adjustability', 'cord length', 'cup size', 'subtitles', 'ingredient transparency', 'included accessories', 'performance', 'power', 'strength' are all better facets than a vague bucket term when the review is clearly about that specific thing. Only fall back to one of these broad names when the review is genuinely about the general quality and no more specific name fits: effectiveness (does it achieve its core purpose -- only when a more specific word like 'performance' or 'power' doesn't fit better), functionality (do its features work as intended), reliability (does it keep working over time / hold up to repeated use -- also the right facet for an isolated failure like 'stopped working'), build quality (construction, sturdiness, materials holding up), appearance (look, style, design, color, finish -- these are all the same dimension, including a brief casual cue like 'looks great' or 'it was pretty', not just explicit description language), size (actual physical dimensions), sizing accuracy (fit relative to the size ordered), ease of use (day-to-day operation, not a one-time setup step like installation or assembly), material, comfort. Never output 'durability' as a facet name -- it is not one of these; use 'reliability' or 'build quality' above, or a more specific term the review supports (e.g. 'strength', 'case quality', 'scratch resistance').
  - Deduplicate facets (see CONSOLIDATE). At most 6 facets, the most salient. If the review discusses no concrete product dimension, return an empty list.
few_shot:
- user: |-
    These boots have amazing arch support and great grip on wet trails, but they are not really waterproof - my socks were soaked after an hour of light rain.
  assistant:
    aspects:
    - facet: arch support
      polarity: positive
      evidence: amazing arch support
    - facet: traction
      polarity: positive
      evidence: great grip on wet trails
    - facet: waterproofing
      polarity: negative
      evidence: not really waterproof - my socks were soaked
- user: |-
    Love it!!! Five stars.
  assistant:
    aspects: []
- user: |-
    Runs small, order a size up. Also the box arrived crushed but the seller shipped a replacement quickly.
  assistant:
    aspects:
    - facet: sizing accuracy
      polarity: negative
      evidence: Runs small, order a size up
- user: |-
    Muy comodo y el material se siente de buena calidad, aunque el color es mas oscuro que en las fotos.

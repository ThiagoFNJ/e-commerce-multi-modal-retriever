notes: 'The lineage is the decisive piece of evidence here: gm4, gm5, gm6, and gm7 are all children of
  gm3 (the current best, F1 0.6384) and every single one of them scored worse (0.6060, 0.5837, 0.5881,
  0.5894) despite each targeting the exact same material/build-quality/durability/softness distinctions
  bullet from a different angle -- gm4 sharpened material-vs-build-quality-vs-softness, gm5 rewrote the
  material definition to exclude softness/toughness/bare-naming, gm6 added a formal ''effectiveness''
  definition to that same distinctions list, and gm7 left the bullet untouched but still lost ground on
  other edits. Four independent attempts to fix this exact boundary in this exact way have now failed,
  even though it remains the single largest source of error mass in this round''s data (build quality
  FP=13, material FP=11, durability FP=8, build quality FN=5) -- confirmed again in the worst-scoring
  reviews (Jellycat bunny: gold ''build quality''+''softness'' vs predicted ''material''+''appearance'';
  LED strobe: gold ''sturdiness''+''portability'' vs predicted ''material''+''build quality'', the very
  case gm3''s camping-stool example was meant to fix and evidently didn''t transfer because the review''s
  own text literally says ''the material...is very rigid plastic'', a strong lexical trap). Given four
  failed attempts, re-touching this boundary a fifth time -- via yet another rewritten definition -- is
  exactly the ''edit that already failed'' the protocol says not to re-propose, regardless of how large
  its error mass is; the mass looks less like a wording problem and more like a reasoning ceiling for
  this model on this specific five-way distinction. So this round deliberately does NOT touch lines defining
  functionality/reliability/durability/build quality/material, and instead spends its edit budget on three
  under-explored levers with clear, still-untried evidence: (1) the ''performance'' ban is stated but
  still leaking (FP=4 again this round) with no fallback given when the model reaches for it -- I appended
  a concrete fallback (functionality or effectiveness) to the existing ban sentence, a one-clause addition
  to the specific-over-generic rule, not the fragile distinctions bullet. (2) ''fit'' and ''sizing accuracy''
  are crossed in both directions this round (fit FN=4, sizing accuracy FP=5) and the worst-review evidence
  shows why: ''Extremely large at the bottom of leg opening'' gold wants ''fit'' (a localized body/gear
  interface) but the model said ''sizing accuracy'' (an overall labeled-size claim) because the current
  rule only defines ''sizing accuracy'' and leaves ''fit'' as an undefined catch-all word. I extended
  the near-synonym bullet -- the same lever gm3 already used successfully when it added ''color'' there
  without regressing the score -- to give ''fit'' its own clause distinguishing localized-area wearable
  fit from overall sizing accuracy, and removed ''fit'' from the generic catch-all list now that it has
  a real definition. (3) ''appearance'' is the single largest missed-gold-facet mass this round (FN=9)
  and ''effectiveness'' is second (FN=7); rather than add another formal rule to the already over-edited
  distinctions area (which is what burned gm6), I used a few-shot example to demonstrate both: a dense
  synthetic review where a real-world-outcome judgment (''hasn''t managed to get past it once'') is ''effectiveness''
  and a brief, easily-missed aesthetic aside (''soft matte gray that blends into our hallway'') is still
  worth extracting as ''appearance'', directly modeling the recall failure seen in the watch-band-tool
  review (gold ''appearance''+''included accessories'', predicted only ''versatility'', missing the incidental
  ''bling'' remark entirely). The second new example is a rain-pants review with a positive ''sizing accuracy''
  + negative ''fit'' pair in one review, mirroring gm3''s successful durability/reliability pairing pattern,
  to teach the new fit/sizing-accuracy boundary directly rather than only through a rule sentence. Both
  examples are freshly written and copy no development review text. All eight existing few-shot examples
  are kept unchanged since none of the evidence points to a problem with them specifically, and touching
  the two camping-stool/remote-car examples that already improved gm3''s score would risk undoing that
  gain for no evidenced reason.'
change_summary: '1. Appended a concrete fallback to the existing ''never use performance'' sentence (use
  ''functionality'' or ''effectiveness'' instead) -- targets persistent performance FP=4, without touching
  the five-term distinctions bullet.

  2. Extended the near-synonym bullet (the same bullet gm3 successfully edited to add ''color'') with
  a new ''fit'' clause distinguishing localized wearable-area fit from overall ''sizing accuracy'' --
  targets the two-directional fit(FN=4)/sizing accuracy(FP=5) crossing evidenced by the leg-opening review
  (''Extremely large at the bottom of leg opening'', gold ''fit'', predicted ''sizing accuracy'').

  3. Removed ''fit'' from the generic catch-all vocabulary list since it now has its own formal definition,
  avoiding a contradiction between the two bullets.

  4. Deliberately left the functionality/reliability/durability/build quality/material distinctions bullet
  and the material definition completely unchanged -- four sibling rounds (gm4, gm5, gm6, gm7) already
  rewrote pieces of this exact boundary and every one scored below gm3, so a fifth rewrite is a known-failed
  edit type regardless of its large error mass.

  5. Added one new synthetic few-shot example (baby gate) demonstrating ''effectiveness'' (the product
  achieving its real-world containment purpose) alongside a brief, easily-missed ''appearance'' aside
  and an ''installation'' complaint -- targets this round''s largest missed-facet mass (appearance FN=9)
  and second-largest (effectiveness FN=7).

  6. Added one new synthetic few-shot example (rain pants) demonstrating a positive ''sizing accuracy''
  + negative ''fit'' pair in the same review -- targets the new fit vs sizing-accuracy boundary directly,
  mirroring gm3''s successful durability/reliability pairing pattern.

  No existing few-shot examples were modified or removed (2 additions used of the 2-example budget).'
version: gm8
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION or discrete COMPONENT of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life', 'camera', 'speaker'. If several components share one complaint (e.g. multiple panels that all fit badly), name the shared dimension once ('fitment', 'build quality') rather than each part; name a specific component only when its opinion is genuinely distinct from the rest.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
  - Prefer the most specific concrete facet the review actually supports over a broad outcome or category term. This applies to ALL SEVEN of 'effectiveness', 'functionality', 'reliability', 'durability', 'build quality', 'material', and 'appearance': reach for one of these seven only when the review gives no more specific mechanism, feature, or quality to name -- if it names one (suction, stability, sturdiness, portability, strength, softness, mess control, organization, mounting design, ease of attachment, dispensing, storage capacity, power, battery life, software, versatility, brewing quality, and so on), use that specific term instead. Never use 'performance' as a facet, even for brief unspecific praise or blame: always name the specific thing that performed well or badly (power, speed, brewing quality, accuracy, ...); if nothing more specific is named, fall back to 'functionality' (mechanism operates as designed) or 'effectiveness' (achieves its intended real-world outcome) instead, never 'performance'.
  - Among those seven broad terms, when more than one could plausibly apply, use these distinctions:
    - 'functionality': the product's features or mechanisms operate as designed, including plain "it works" / "no problems" statements with no further detail given.
    - 'reliability': the product (or one of several like units) stops working, malfunctions, glitches, or behaves inconsistently -- across repeated use or after a period of time -- even if that happens later rather than immediately. A device that fails outright after months of use is a reliability judgment, not a durability one.
    - 'durability': the product's physical materials or components gradually wear, fade, weaken, or degrade over extended time or repeated use -- a condition/degradation judgment, not a stop-working judgment -- and never immediate/out-of-box defects.
    - 'build quality': how well the product is assembled or constructed -- workmanship, structural integrity, parts fitting together, or defects, including out-of-box defects -- and also any bare, undetailed statement of overall "quality" ('great quality', 'the quality is amazing') that does not itself describe the substance or fabric.
    - 'material': the substance or fabric itself, judged on its own feel, texture, or composition ('great material', 'feels like cheap plastic', 'soft fabric') -- only when the review actually describes that substance; a generic quality compliment with no substance description is 'build quality', not 'material'.
  - When a review makes many small observations that all serve one underlying theme (a long testimonial on whether a workout, tool, or treatment worked as intended) AND names no other distinct concrete dimension, extract ONE facet for that theme using the definitions above instead of several fine-grained ones that fragment it. Do not apply this consolidation to a short review that already names 1-3 distinct concrete dimensions -- extract those directly instead.
  - 'effectiveness', 'durability', 'build quality', and 'material' describe physical products or products applied to the body, and never apply to creative or informational works (books, movies, shows, music, articles). For those, use dimensions such as 'plot', 'characters', 'writing quality', 'pacing', 'humor', 'engagement', 'emotional impact', or 'entertainment value' instead.
  - Preferred terms for near-synonyms (matching is by semantic similarity, so use the left term, not the one on the right): 'appearance' for a general visual impression, finish, print, or overall look that is not framed as a design choice and not specifically about color -- extract it even when it is a brief aside in a review mostly about something else; 'color' for a comment specifically about the product's hue or color, whether the reviewer simply likes or dislikes it or is comparing it to photos/expectations; 'design' for the product's overall styling, shape, or aesthetic/ergonomic design as a considered choice ('beautiful design', 'sleek design', 'well-designed'); 'size' for a non-wearable object's physical dimensions being too big or small for its purpose; 'sizing accuracy' only for how a wearable item runs relative to its labeled or expected size OVERALL (runs small/large, order-a-size-up situations); 'fit' for how a specific part or area of a wearable item (waistband, cuff, sleeve, leg opening, strap) sits against the body or against what it's worn with, when the complaint is not framed as an overall labeled-size deviation; 'included accessories' for extra items, tools, or parts bundled with the product.
  - If none of the terms above fit, name the dimension using the review's own vocabulary (e.g. 'installation', 'condition', 'style', 'thickness', 'scratch resistance', 'ease of cleaning', 'sturdiness', 'portability', 'strength', 'softness', 'mess control', 'organization', 'mounting design', 'ease of attachment', 'dispensing', 'ingredient safety', 'educational value', 'scent', 'storage capacity') rather than forcing it into one of the broad terms above.

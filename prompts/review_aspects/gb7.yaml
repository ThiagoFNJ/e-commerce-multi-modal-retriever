notes: 'gb6 (F1 0.5037) is the best candidate and stays the parent; this round avoids gb3/gb4/gb5''s already-failed
  directions (no durability ban, no recommendation ban, no price/value outcome-rule reframe) and, new
  this round, also avoids re-trying gb6''s OWN two targeted fixes with the same mechanism, because the
  evidence shows both measurably failed: (a) appearance''s missed-facet mass is still 15 -- literally
  unchanged from before gb6''s fix -- and B07BHKVZPX#8, the exact review gb6 cited as motivation, still
  predicts nothing but ''versatility'' with only 1 total facet output, meaning the salience-cap-pruning
  theory was the wrong diagnosis (there''s no cap pressure with 1 facet); the real failure is that indirect/comparative
  visual language (''looks like Quality without looking feminine'') isn''t being recognized as appearance
  at all, so this round fixes recognition via a new example instead of cap-protection prose. (b) B07ZHYS7MD#6
  still leaks ''customer support''/''replacement parts'' as FPs despite two dedicated rounds of fixes
  (gb2''s targeted rewrite, gb6''s length-bias rule + example) -- a third poke at the same review with
  the same exclusion-rule lever looks like diminishing returns, so this round leaves the exclusion rule
  untouched and spends its budget elsewhere. Three NEW evidence-dense patterns dominate the current worst-review
  set instead: (1) Severe, worsening dedup failure -- gb6 added a mandatory re-scan step after one review
  showed a single duplicate (''plot'' x2), but this round''s worst reviews show it getting WORSE, not
  better: B08NV5452X#3 outputs ''fit'' five times and B01N2U5J5U#1 outputs ''build quality'' four times,
  both f1=0.0. The common structure in both is several DIFFERENT clauses (different repeated phrasings,
  or different sub-parts like arms/legs/head each falling off) all describing ONE dimension -- the CONSOLIDATE
  rule doesn''t yet say this counts as one mention, so the model treats each clause as a fresh fact. (2)
  A cross-cutting facet-naming-discipline gap: at least 5 of the 20 worst reviews (B00MFYQJ0O#6''s ''warning''/''usage'',
  B07Y5WMGGG#12''s ''tool''/''bling'', B007D53QRE#9''s ''peel and stick'' for gold ''installation'', B07ZKF8RSG#9''s
  ''pasta type'' for gold ''effectiveness'', B07K2SWHGN#4''s ''dispenser reliability'' for gold ''dispensing'')
  show the model inventing a literal, ad hoc compound noun straight from the review''s own wording instead
  of mapping to a canonical dimension name -- a distinct failure mode from the existing specific-vs-broad
  guidance, since these aren''t cases of choosing too broad a bucket, they''re cases of not using the
  prompt''s vocabulary at all. (3) ''durability'' remains the 3rd-largest FP name (11) and B07FTS5166#6
  shows a mechanism gb6''s build-quality/durability split didn''t cover: ''this leash can handle him''
  (a big dog pulling) is gold ''strength'' (capacity to bear force/load at time of use), which isn''t
  durability (extended wear) or build quality (construction) -- ''strength'' simply isn''t in the specific-dimension
  list yet, so the model defaults to the nearest listed term. A related, smaller confusion: ''size'' vs
  ''sizing accuracy'' remain FP/FN twins (5/5) and B01IAIHRWW#2 (''fits my wife''s hand, not mine, both
  ordered the same size'') shows the existing distinction isn''t concrete enough to apply reliably, so
  its definition gets sharper worked phrasing rather than a new example (staying within the 2-example
  budget).'
change_summary: '1. CONSOLIDATE rule: added an explicit statement that repeated mentions of the same dimension
  via different sub-parts or different phrasing (e.g. an armrest, then a hinge, then the legs all wobbling)
  still count as ONE mention and must collapse to one facet -- not once per clause. Targets B08NV5452X#3
  (''fit'' output 5 times) and B01N2U5J5U#1 (''build quality'' output 4 times), both f1=0.0 and both worse
  than the single-duplicate case that motivated gb6''s re-scan step, which did not fix this.


  2. Deduplicate-facets rule: reframed the mandatory re-scan step around the actual mechanism -- a duplicate
  facet name means a consolidation failure, not just a list-cleanup step, so the instruction is now to
  merge the two mentions rather than just delete one. Same targets as edit 1.


  3. New rule, ''USE CANONICAL NAMES'': added an explicit instruction to prefer a dimension name already
  in the prompt''s own vocabulary (or a close paraphrase) over inventing a one-off compound noun lifted
  from the review''s literal wording, with the underlying mapping principle illustrated inline. Targets
  5 of the 20 worst reviews where the model invented ad hoc facet names instead of using canonical ones:
  B00MFYQJ0O#6, B07Y5WMGGG#12, B007D53QRE#9, B07ZKF8RSG#9, B07K2SWHGN#4.


  4. Specific-dimension rule: added ''strength'' (capacity to bear load/weight/force at time of use) as
  a new specific dimension, explicitly distinguished from durability (extended wear over time) and build
  quality (construction). Targets B07FTS5166#6 (gold ''strength'', predicted ''durability'') and continues
  reducing durability''s persistent FP mass (11, still 3rd-largest FP name after two prior rounds of durability-boundary
  work).


  5. Specific-dimension rule: sharpened the ''sizing accuracy'' definition with concrete worked phrasing
  (runs small/large; doesn''t fit despite ordering the labeled size; fits one person but not another at
  the same labeled size). Targets B01IAIHRWW#2 (gold ''sizing accuracy'', predicted ''size'') and the
  ''size''/''sizing accuracy'' FP/FN overlap (5/5).


  6. Specific-dimension rule (''appearance'' entry): broadened the description to explicitly include indirect
  and comparative visual language (''doesn''t look cheap'', ''looks better than I expected''), not just
  direct/brief mentions -- correcting gb6''s diagnosis that appearance was being dropped by the salience
  cap; the new worst-review evidence (B07BHKVZPX#8, only 1 total facet predicted, so no cap pressure)
  shows the real gap is recognition, not pruning.


  7. Added few-shot example 11 (wobbly chair, synthetic): demonstrates three separate clauses about different
  sub-parts (armrest, hinge, legs) consolidating into ONE ''build quality'' facet, plus a one-time-setup
  clause correctly named ''assembly'' rather than ''ease of use''. Reinforces edits 1-2, structurally
  mirroring B01N2U5J5U#1''s multi-part-failure pattern without copying its text.


  8. Added few-shot example 12 (desk phone stand, synthetic): demonstrates recognizing appearance from
  indirect, comparative visual language (''doesn''t look cheap... fits in a lot better than I thought'')
  even when it is not the review''s main topic (functionality is). Reinforces edit 6, structurally mirroring
  B07BHKVZPX#8''s indirect-appearance pattern without copying its text.'
version: gb7
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'build quality', 'sizing accuracy', 'ease of use'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, and anything about buying or owning the product rather than the product itself. Specifically exclude: the price paid, value for money, cost, and whether it's "worth it" or a "reasonable price"; listing/description accuracy; and customer service in any form -- support responsiveness, replacement-parts availability, warranty handling, how fast or slow the seller/manufacturer replied. If a sentence mixes a real product complaint with a service/support complaint (e.g. "the charger stopped working and support never replied"), extract only the product part. The RELATIVE LENGTH of a complaint does not decide what to extract: a single short clause naming a genuine product detail is still extractable even if it's buried inside a much longer listing/seller/shipping/service complaint, and a long service or support complaint is still fully excluded even if it dominates the review -- judge each clause by what it's about, not by how much of the review it takes up.
  - Never the product category itself ('boots' is not a facet of boots); no brand names; never a named character, person, actor, or title -- for books, movies, and other creative works, name the CRAFT dimension being judged instead: 'plot', 'characters', 'writing quality', 'content quality', 'pacing', 'engagement' (how compelling or hard to put down it is), 'emotional impact' (how moving or affecting it is), 'humor' (how funny it is), 'video quality', 'audio quality' -- never the character's, author's, or performer's name.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - USE CANONICAL NAMES, don't invent one-off compounds: prefer a dimension name from this prompt's own lists (or a close paraphrase of one) over a novel noun phrase lifted straight from the review's wording. If the review names a specific component or a specific way the product failed to do what it claimed, name the DIMENSION that component or claim belongs to, not the literal words -- e.g. an item that didn't peel and stick as claimed is about installation, not a facet named after the literal phrase; a product that turned out to be a different variant than what was ordered/advertised is about effectiveness (it didn't deliver what it promised), not a facet named after the literal item; a dispenser that releases too many at once is about dispensing, not a compound like "dispenser reliability"; something praised for matching or complementing its surroundings is about appearance, not a facet named after a slang or novelty word from the review. Only coin a new noun phrase when truly no listed or close-paraphrase dimension fits.
  - CONSOLIDATE: if several sentences or clauses all describe the same underlying dimension, report ONE facet for that dimension, not one per mention -- this applies even when each mention uses different words or points at a different sub-part (e.g. an armrest wobbling, then a hinge coming loose, then the legs wobbling are three mentions of ONE dimension, build quality, not three separate facets). Most reviews need only 1-3 facets; use more only when the review clearly discusses several distinct dimensions.
  - Name the SPECIFIC dimension the review is actually about -- 'installation', 'assembly', 'adjustability', 'cord length', 'cup size', 'subtitles', 'ingredient transparency', 'included accessories' are all better facets than a vague bucket term when the review is clearly about that specific thing. Only fall back to one of these broad names when the review is genuinely about the general quality and no more specific name fits: effectiveness (does it achieve its core purpose or deliver what it claimed to), functionality (do its features work as intended), reliability (does it keep working, without failing or breaking down, across repeated use), build quality (construction, sturdiness -- including a ONE-TIME breakage, crack, or falling apart, e.g. "fell apart as I unpacked it"), durability (holds up over an EXTENDED period of repeated wear or use -- only use this when the review itself frames it that way, e.g. "after six months of daily use"; a single immediate failure is build quality, not durability), strength (whether it can bear the load, weight, or force put on it AT THE TIME of use, e.g. a leash that "can handle" a large dog pulling, a shelf holding heavy books without sagging -- distinct from durability, which is about holding up over time, and from build quality, which is about how it's constructed), appearance (look, style, design, color, finish -- these are all the same dimension; any visual/cosmetic remark counts, however brief or indirect -- a passing aside ("it was pretty"), a comparison ("looks better than I expected next to my other stuff"), or a backhanded compliment ("doesn't look cheap") are all appearance, and must not be dropped just because another facet in the same review seems more substantial or is the review's main topic), size (actual physical dimensions), sizing accuracy (fit relative to the size ordered -- runs small or large, doesn't fit despite ordering the labeled size, fits one person but not another despite the same labeled size), ease of use (day-to-day operation, not a one-time setup step like installation or assembly), material, comfort.
  - Deduplicate facets: never output the same facet name twice in one review. A duplicate almost always means two mentions of the same dimension weren't consolidated (see CONSOLIDATE) -- if you notice you are about to write a facet name a second time, that is your signal to merge it into the first occurrence instead of just dropping the second one. Before returning your answer, re-scan the facet list you are about to output and merge or remove any repeated name -- this check is mandatory even when you're confident you already deduplicated while composing. At most 6 facets, the most salient. If the review discusses no concrete product dimension, return an empty list.

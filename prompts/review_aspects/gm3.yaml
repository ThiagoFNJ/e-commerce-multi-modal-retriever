notes: 'gm2''s ''prefer specific over generic'' rule only covered effectiveness/functionality/reliability,
  so it fixed those (functionality FP 29->5, build quality FP 33->10 versus gm1) but left durability,
  build quality, appearance and material outside its scope -- and durability''s FP mass jumped to become
  the single largest this round (FP=12), while build quality is simultaneously the largest FN (12) and
  still FP=10 (misapplied in both directions), and functionality is still the second-largest FN (8) despite
  the FP fix. The worst-scoring reviews show this concretely and consistently: an LED-strobe review gets
  ''material''+''build quality'' where gold wants ''sturdiness''+''portability'', a stuffed-animal review
  gets ''material''+''appearance'' where gold wants ''build quality''+''softness'', a sequins review and
  a hoodie review both get ''material'' where gold wants a bare ''build quality'' (''the quality is amazing'',
  ''otherwise, great quality!'' -- general quality praise with no substance/fabric description, which
  the current material definition doesn''t exclude), a dog-leash review gets ''durability'' where gold
  wants ''strength'', and a coloring-book review gets ''durability'' with no clear textual anchor at all
  where gold wants ''mess control'' -- durability has become a default filler the same way functionality
  was last round. Separately, reliability vs. durability vs. functionality are being crossed in both directions:
  an earbud review where ''one no longer works after less than 3 months'' gets ''durability'' where gold
  wants ''reliability'' (a stop-working judgment, not a gradual-wear one), a phone/software review and
  a Spanish ''no ha presentado ningun problema'' review both get functionality/reliability swapped relative
  to gold, and a candle review gets ''effectiveness'' where gold wants ''functionality''. None of these
  are new failure modes needing new mechanisms -- they are the same ''default to a generic label'' failure
  from last round, now redistributed onto the four terms gm2''s rule didn''t cover, plus a genuine boundary
  ambiguity (durability vs. reliability, material vs. build quality) that the current definitions don''t
  resolve. This round''s edits therefore: (1) extend the specific-over-generic rule to all seven broad
  terms (adding durability, build quality, material, appearance) with concrete replacement vocabulary
  drawn directly from this round''s worst reviews (sturdiness, portability, strength, softness, mess control,
  organization, mounting design, ease of attachment, dispensing, storage capacity); (2) sharpen the reliability/durability
  boundary as ''stops working or behaves inconsistently'' vs. ''gradually wears/fades/weakens'', explicitly
  noting that a device failing outright after months of use is reliability, not durability, directly targeting
  the earbud review; (3) restrict ''material'' to cases that actually describe the substance/fabric, with
  bare ''quality'' statements defaulting to ''build quality'', targeting the sequins and hoodie reviews;
  (4) add ''color'' as a preferred term distinct from ''appearance'' for hue-specific comments (a gorgeous-color-plus-flawless
  review missed both ''color'' and ''build quality'' this round); (5) fold the old standalone material/build-quality
  clause into one combined distinctions bullet so the new content fits without letting the prompt grow
  unboundedly. For the two few-shot changes (within the 2-example budget): I added two new synthetic examples
  -- a camping-stool review and a remote-control-car review -- because no existing example demonstrates
  sturdiness/portability preferred over material/build quality, the durability-vs-reliability split on
  a positive+negative pair in the same review, or the functionality-vs-build-quality split; both are dense,
  multi-aspect, and written fresh, without copying any development-set review.'
change_summary: 'Broadened the ''prefer specific over generic'' rule from {effectiveness, functionality,
  reliability} to all seven broad terms (adding durability, build quality, material, appearance), with
  new example replacement vocabulary (sturdiness, portability, strength, softness, mess control, organization,
  mounting design, ease of attachment, dispensing, storage capacity) -- targets this round''s largest
  FP (durability 12) and the persistent build quality/functionality FP+FN masses, evidenced in the LED-strobe,
  dog-leash, and coloring-book worst-scoring reviews.


  Replaced the separate durability/build-quality/material sentences with one combined distinctions bullet
  that sharpens durability vs. reliability (''gradually wears/fades/weakens'' vs. ''stops working, malfunctions,
  or behaves inconsistently, even after a period of use'') -- targets the earbud review (''one no longer
  works'' predicted durability, gold wants reliability) and the general reliability/functionality FP+FN
  churn seen in the phone-software and Spanish ''sin problema'' reviews.


  Restricted ''material'' to cases that actually describe the substance/fabric/texture, with bare unqualified
  ''quality'' statements now defaulting to ''build quality'' -- targets the sequins review and hoodie
  review, both of which got ''material'' where gold wanted a bare ''build quality''.


  Added ''color'' as a new preferred term distinct from ''appearance'', for comments specifically about
  hue/color (liked, disliked, or compared to photos) -- targets missed gold facet ''color'' (FN3), seen
  in the gorgeous-color-plus-flawless worst-scoring review where the model said only ''appearance''.


  Expanded the closing catch-all vocabulary list with terms recurring in this round''s residual missed
  facets (sturdiness, portability, strength, softness, mess control, organization, mounting design, ease
  of attachment, dispensing, ingredient safety, educational value, scent, storage capacity) -- targets
  the smaller missed-facet masses (fit, size, style, ingredient safety, installation, weight) without
  inventing unevidenced dedicated rules per term.


  Added one new synthetic few-shot example (collapsible camping stool) demonstrating sturdiness/portability
  preferred over material/build quality, plus a positive durability vs. negative reliability pair in the
  same review, without copying any development-set text.


  Added one new synthetic few-shot example (remote-control car) demonstrating the functionality-vs-build-quality
  split (operating mechanism vs. structural integrity) plus included accessories, without copying any
  development-set text.'
version: gm3
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION or discrete COMPONENT of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life', 'camera', 'speaker'. If several components share one complaint (e.g. multiple panels that all fit badly), name the shared dimension once ('fitment', 'build quality') rather than each part; name a specific component only when its opinion is genuinely distinct from the rest.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
  - Prefer the most specific concrete facet the review actually supports over a broad outcome or category term. This applies to ALL SEVEN of 'effectiveness', 'functionality', 'reliability', 'durability', 'build quality', 'material', and 'appearance': reach for one of these seven only when the review gives no more specific mechanism, feature, or quality to name -- if it names one (suction, stability, sturdiness, portability, strength, softness, mess control, organization, mounting design, ease of attachment, dispensing, storage capacity, power, battery life, software, versatility, brewing quality, and so on), use that specific term instead. Never use 'performance' as a facet: always name the specific thing that performed well or badly (power, speed, brewing quality, accuracy, ...).
  - Among those seven broad terms, when more than one could plausibly apply, use these distinctions:
    - 'functionality': the product's features or mechanisms operate as designed, including plain "it works" / "no problems" statements with no further detail given.
    - 'reliability': the product (or one of several like units) stops working, malfunctions, glitches, or behaves inconsistently -- across repeated use or after a period of time -- even if that happens later rather than immediately. A device that fails outright after months of use is a reliability judgment, not a durability one.
    - 'durability': the product's physical materials or components gradually wear, fade, weaken, or degrade over extended time or repeated use -- a condition/degradation judgment, not a stop-working judgment -- and never immediate/out-of-box defects.
    - 'build quality': how well the product is assembled or constructed -- workmanship, structural integrity, parts fitting together, or defects, including out-of-box defects -- and also any bare, undetailed statement of overall "quality" ('great quality', 'the quality is amazing') that does not itself describe the substance or fabric.
    - 'material': the substance or fabric itself, judged on its own feel, texture, or composition ('great material', 'feels like cheap plastic', 'soft fabric') -- only when the review actually describes that substance; a generic quality compliment with no substance description is 'build quality', not 'material'.
  - When a review makes many small observations that all serve one underlying theme (a long testimonial on whether a workout, tool, or treatment worked as intended) AND names no other distinct concrete dimension, extract ONE facet for that theme using the definitions above instead of several fine-grained ones that fragment it. Do not apply this consolidation to a short review that already names 1-3 distinct concrete dimensions -- extract those directly instead.
  - 'effectiveness', 'durability', 'build quality', and 'material' describe physical products or products applied to the body, and never apply to creative or informational works (books, movies, shows, music, articles). For those, use dimensions such as 'plot', 'characters', 'writing quality', 'pacing', 'humor', 'engagement', 'emotional impact', or 'entertainment value' instead.
  - Preferred terms for near-synonyms (matching is by semantic similarity, so use the left term, not the one on the right): 'appearance' for a general visual impression, finish, print, or overall look that is not framed as a design choice and not specifically about color; 'color' for a comment specifically about the product's hue or color, whether the reviewer simply likes or dislikes it or is comparing it to photos/expectations; 'design' for the product's overall styling, shape, or aesthetic/ergonomic design as a considered choice ('beautiful design', 'sleek design', 'well-designed'); 'size' for a non-wearable object's physical dimensions being too big or small for its purpose; 'sizing accuracy' only for how a wearable item runs relative to its labeled or expected size; 'included accessories' for extra items, tools, or parts bundled with the product.
  - If none of the terms above fit, name the dimension using the review's own vocabulary (e.g. 'installation', 'fit', 'condition', 'style', 'thickness', 'scratch resistance', 'ease of cleaning', 'sturdiness', 'portability', 'strength', 'softness', 'mess control', 'organization', 'mounting design', 'ease of attachment', 'dispensing', 'ingredient safety', 'educational value', 'scent', 'storage capacity') rather than forcing it into one of the broad terms above.

notes: 'Two clean gaps stand out this round, both fitting the lineage''s proven pattern (gi5-gi8): add
  exactly one new demonstration for a facet the model already reaches for but has never been shown, rather
  than touching rule bullets (failed twice, gi1/gi4) or re-editing the sizing-accuracy/size split (still
  only one confirming instance, still too risky per gi8''s reasoning) or the air-purifier/shirt-sizing
  examples just added last round. First: ''durability'' is now the single largest false-positive mass
  in the whole report (FP=14, larger than last round''s top mass of 12), and it has zero demonstrations
  anywhere in the prompt despite being the model''s default catch-all whenever something physically robust
  is discussed -- confirmed by B07FTS5166#6 (''this leash can handle him'' with a 100lb dog -> gold strength;
  pred durability), where the model reached for the undemonstrated-but-familiar ''durability'' instead
  of the correct dimension. Edit 1 adds a synthetic tow-strap example contrasting ''strength'' (can it
  handle a heavy load right now) against ''durability'' (does it hold up over repeated long-term use without
  wearing out) in the same review, giving ''durability'' its first-ever correct demonstration and a precise
  boundary against the load-bearing sense the model keeps misnaming. Second: three of the twenty worst-scoring
  reviews this round are book reviews that predicted an empty list against 2-3 gold aspects each -- B09431D2DX#3
  (gold plot/characters/writing quality, pred none), B07XB3H7HM#2 (gold humor/characters, pred none),
  B00JNQKR8C#9 (gold engagement/entertainement, pred none) -- and ''plot'' and ''characters'' both appear
  twice in the missed-gold-facet list despite the small fraction of book reviews in the set, meaning the
  model is functionally blind to an entire product category: every one of the 9 current few-shot examples
  is a physical object (boots, blender, lamp, shirt, air purifier, stuffed elephant, etc.), so the model
  has no precedent that narrative/creative-work dimensions count as facets at all. Edit 2 adds a synthetic
  mystery-novel example demonstrating ''plot'' (positive) and ''characters'' (positive) against ''writing
  quality'' (negative) in one review, directly matching the gold vocabulary from the confirming reviews
  (legitimate per the semantic-matching note) without copying any review text. I deliberately do not add
  a third functionality/effectiveness demo even though functionality FN rose slightly (9->10) after gi8''s
  dedicated air-purifier example: two targeted demos (blender, air purifier) already exist for that concept
  and barely moved the number, while the confirming failures this round (B08NHPQMY5#6 -> ''massage performance'',
  B089K66GRZ#5 -> ''organization'') show the model inventing bespoke, product-category-specific substitutes
  rather than lacking a general demonstration -- a different failure mode than the ''never demonstrated
  anywhere'' pattern that made softness, fit, and (partially) this round''s durability/book edits work,
  and not fixable by one more generic demo. Both edits are pure additions (no rule bullets, no existing
  examples touched), bring the few-shot count from 9 to 11, well under double the v2 baseline''s 7, and
  use fully synthetic text.'
change_summary: '1) Added a synthetic tow-strap few-shot example contrasting ''strength'' (positive: held
  full towing load without stretching or snapping) against ''durability'' (negative: webbing fraying and
  a stitched loop pulling apart after a summer of use) in the same review -- targets the single largest
  FP mass in the report (durability=14), which has never been demonstrated as a correct facet anywhere
  in the prompt, confirmed by B07FTS5166#6 where a leash''s load-bearing capacity (gold strength) was
  mispredicted as durability. 2) Added a synthetic mystery-novel few-shot example demonstrating ''plot''
  (positive) and ''characters'' (positive) against ''writing quality'' (negative) -- targets a fully undemonstrated
  product domain (books/media), confirmed by three of the twenty worst-scoring reviews this round (B09431D2DX#3,
  B07XB3H7HM#2, B00JNQKR8C#9) that predicted an empty list against 2-3 gold narrative-dimension aspects
  each, because all 9 existing examples are physical-object reviews. Left the size/sizing-accuracy boundary,
  the rule bullets, and the just-added air-purifier/shirt-sizing examples untouched; did not add a third
  functionality/effectiveness demo since two prior dedicated demos left functionality FN essentially flat
  (9->10), pointing to bespoke per-category term invention rather than a missing-demonstration gap. Both
  changes are additive only, few-shot count grows from 9 to 11, no dev review text copied.'
version: gi9
system: |-
  You extract product aspects from one customer review.

  Rules:
  - A facet is a short lowercase English noun phrase (1-4 words) naming a DIMENSION of the product: 'arch support', 'waterproofing', 'sizing accuracy', 'battery life'.
  - Polarity-neutral: name the dimension, never the opinion or the value. 'runs small' -> facet 'sizing accuracy', polarity 'negative'.
  - Product-intrinsic only: ignore delivery, shipping, packaging condition, the seller, the price paid, and customer service -- they are not aspects of the product.
  - Never the product category itself ('boots' is not a facet of boots); no brand names.
  - Facets are always English, even when the review is not.
  - 'evidence' is a short verbatim quote from the review supporting the facet.
  - Deduplicate facets. At most 6, the most salient. If the review discusses no concrete product dimension, return an empty list.
